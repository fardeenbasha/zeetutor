<!-- ============================================================
     PART 1 — SYNC BLOCK — NEVER EDIT ANYTHING BELOW THIS LINE
     ============================================================ -->
<script>
  window.isSimulating = false;
  const urlParams = new URLSearchParams(
    window.location.search || window.location.hash.replace('#','?')
  );
  const roomId = urlParams.get('room') || '54321';
  let localSeed = 0;
  for (let i = 0; i < roomId.length; i++) {
    localSeed = roomId.charCodeAt(i) + ((localSeed << 5) - localSeed);
  }
  localSeed = Math.abs(localSeed);
  window.seededRandom = function() {
    let x = Math.sin(localSeed++) * 10000;
    return x - Math.floor(x);
  };
  function getUniqueSelector(el) {
    if (!el) return null;
    if (el.id) return '#' + el.id;
    if (el === document.body) return 'body';
    let path = [];
    while (el && el.nodeType === Node.ELEMENT_NODE) {
      let sel = el.nodeName.toLowerCase();
      if (el.id) { sel = '#' + el.id; path.unshift(sel); break; }
      else {
        if (el.className && typeof el.className === 'string') {
          const cls = Array.from(el.classList)
            .filter(c => !c.includes(':') && !c.includes('[') && !c.includes('/'))
            .join('.');
          if (cls) sel += '.' + cls;
        }
        let sib = el, nth = 1;
        while (sib = sib.previousElementSibling)
          if (sib.nodeName.toLowerCase() === el.nodeName.toLowerCase()) nth++;
        sel += ':nth-of-type(' + nth + ')';
        path.unshift(sel);
      }
      el = el.parentNode;
    }
    return path.join(' > ');
  }
  document.addEventListener('click', (e) => {
    if (e.isTrusted === false || window.isSimulating) return;
    const sel = getUniqueSelector(e.target);
    if (!sel) return;
    window.parent.postMessage({
      type: 'IFRAME_ACTION_TRIGGERED',
      payload: { type: 'UNIVERSAL_CLICK', selector: sel, seed: localSeed }
    }, '*');
  }, true);
  document.addEventListener('mousemove', (e) => {
    window.parent.postMessage({
      type: 'IFRAME_ACTION_TRIGGERED',
      payload: {
        type: 'UNIVERSAL_CURSOR',
        pctX: (e.clientX / window.innerWidth) * 100,
        pctY: ((e.clientY + window.scrollY) / document.documentElement.scrollHeight) * 100
      }
    }, '*');
  });
  document.addEventListener('touchmove', (e) => {
    if (e.touches.length > 0) {
      window.parent.postMessage({
        type: 'IFRAME_ACTION_TRIGGERED',
        payload: {
          type: 'UNIVERSAL_CURSOR',
          pctX: (e.touches[0].clientX / window.innerWidth) * 100,
          pctY: (e.touches[0].clientY / window.innerHeight) * 100
        }
      }, '*');
    }
  }, { passive: true });
  function applyScale() {
    const targetH = 650;
    const curH = window.innerHeight;
    document.documentElement.style.overflow = 'hidden';
    document.body.style.overflow = 'hidden';
    if (curH < targetH) {
      const s = curH / targetH;
      document.body.style.transform = 'scale(' + s + ')';
      document.body.style.transformOrigin = 'top left';
      document.body.style.width = (100 / s) + '%';
      document.body.style.height = (100 / s) + '%';
    } else {
      document.body.style.transform = 'none';
      document.body.style.width = '100%';
      document.body.style.height = '100%';
    }
  }
  window.addEventListener('resize', applyScale);
  window.addEventListener('load', applyScale);
  window.addEventListener('message', (event) => {
    if (event.data?.type === 'EXECUTE_UNIVERSAL_ACTION') {
      const action = event.data.action;
      window.isSimulating = true;
      if (action.seed !== undefined) localSeed = action.seed;
      if (action.type === 'UNIVERSAL_CLICK') {
        const el = document.querySelector(action.selector);
        if (el) el.click();
      } else if (action.type === 'UNIVERSAL_CURSOR') {
        const c = document.getElementById('remote-cursor');
        if (c) {
          c.style.left = (action.pctX / 100 * window.innerWidth) + 'px';
          c.style.top = (action.pctY / 100 * document.documentElement.scrollHeight - window.scrollY) + 'px';
          c.style.display = 'block';
        }
      }
      window.isSimulating = false;
    }
  });
</script>

<!-- ============================================================
     PART 2 — CSS
     ============================================================ -->
<style>
  :root { --bg: #e0f2fe; }
  
  /* ANTI-FLICKER ARMOR: Native selectionum draggingum globally block cheyyunnu */
  * { 
      box-sizing: border-box; 
      -webkit-tap-highlight-color: transparent; 
      -webkit-user-select: none; 
      user-select: none; 
      -webkit-user-drag: none;
  }

  body {
    overflow: hidden; /* NIRBANDHAMANU */
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    touch-action: manipulation;
    height: 650px;
    min-height: 100vh;
  }
  h1, .font-display { font-family: 'Boogaloo', cursive; }

  @keyframes popIn {
    0%   { transform: scale(0.8); opacity: 0; }
    100% { transform: scale(1);   opacity: 1; }
  }
  .pop-in { animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

  .btn-3d {
    transition: transform 0.1s, box-shadow 0.1s;
    box-shadow: 0 6px 0 rgba(0,0,0,0.2);
  }
  .btn-3d:active { transform: translateY(6px); box-shadow: 0 0px 0 rgba(0,0,0,0.2); }

  /* ── SVG scene container ── */
  .svg-container {
    width: 100%; height: auto; aspect-ratio: 4/3;
    background: #87CEEB;
    border-radius: 16px; border: 6px solid white;
    box-shadow: 0 12px 28px rgba(0,0,0,0.15); overflow: hidden;
  }

  /* ── Object animations ── */
  .anim-jet  { animation: flyJet 12s linear infinite; }
  @keyframes flyJet { 0% { transform: translateX(-200px); } 100% { transform: translateX(1000px); } }

  .anim-walk { animation: walkPerson 18s linear infinite; }
  @keyframes walkPerson { 0% { transform: translateX(900px); } 100% { transform: translateX(-200px); } }

  .anim-bob  { animation: bob 2s ease-in-out infinite; transform-origin: bottom; }
  @keyframes bob { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }

  /* ── Diff interaction ── */
  .diff-hitbox { cursor: pointer; }
  /* Hitbox pointer events mathram allow cheyyunnu */
  .diff-hitbox > * { pointer-events: none; }
  .diff-hitbox > .hover-highlight { pointer-events: all; }
  
  .diff-hitbox:hover .hover-highlight { opacity: 0.18; }
  .hover-highlight { transition: opacity 0.2s; }

  /* ── Diff marker ring ── */
  .diff-marker {
    opacity: 0;
    transition: opacity 0.35s, transform 0.35s;
    transform: scale(0.4); transform-origin: center;
    pointer-events: none;
  }
  .diff-marker.found { opacity: 1; transform: scale(1); }

  /* ── Kandethiya badge (kurachu neram kanichittu mayam) ── */
  @keyframes badgePop {
    0%   { opacity: 0; transform: translate(-50%,-60%) scale(0.5); }
    25%  { opacity: 1; transform: translate(-50%,-60%) scale(1.1); }
    75%  { opacity: 1; transform: translate(-50%,-80%) scale(1); }
    100% { opacity: 0; transform: translate(-50%,-100%) scale(0.8); }
  }
  .found-badge {
    position: fixed; pointer-events: none; z-index: 200;
    background: #22c55e; color: white; font-family: 'Boogaloo', cursive;
    font-size: 1.1rem; padding: 4px 14px; border-radius: 50px;
    border: 3px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    animation: badgePop 1.2s ease forwards;
  }

  /* ── Shariyaya tap-il pulse ring ── */
  @keyframes pulseRing {
    0%   { box-shadow: 0 0 0 0 rgba(34,197,94,0.6); }
    100% { box-shadow: 0 0 0 20px rgba(34,197,94,0); }
  }
  .pulse-tap { animation: pulseRing 0.6s ease; }
</style>

        <circle class="diff-marker marker-person" cx="412" cy="375" r="60" stroke="#FF3366" stroke-width="8" fill="none" stroke-dasharray="15,10"/>
      </g>

    </svg>
  </div>

</main>

<!-- Victory Modal -->
<div id="victory-modal" class="fixed inset-0 bg-black/80 backdrop-blur-sm hidden items-center justify-center z-50">
  <div class="bg-white p-8 rounded-[2.5rem] text-center border-6 border-blue-400 shadow-2xl max-w-sm w-full mx-4 pop-in">
    <div class="text-6xl mb-3">🏆</div>
    <h2 class="font-display text-4xl text-blue-500 mb-1">Mikhachathu!</h2>
    <p class="text-gray-400 font-bold text-base mb-6">5 vyathyasangalum kandethi!</p>
    <button id="btn-reset-modal" onclick="resetGame()"
      class="bg-green-500 text-white px-6 py-3 rounded-full font-black text-xl btn-3d border-4 border-green-700 w-full">
      Veendum Kalikkuka ➔
    </button>
  </div>
</div>

<!-- ============================================================
     PART 3 — GAME LOGIC
     ============================================================ -->
<script>
  // SVG element click() work aakan ulla polyfill
  if (typeof SVGElement !== 'undefined' && !SVGElement.prototype.click) {
    SVGElement.prototype.click = function() {
      const ev = new MouseEvent('click', { bubbles: true, cancelable: true, view: window });
      this.dispatchEvent(ev);
    };
  }

  const TOTAL_DIFFS = 5;
  let foundDiffs = new Set();
  let audioCtx = null;

  function getAC() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    return audioCtx;
  }
  document.addEventListener('click', () => getAC(), { once: true });

  function playBeep(freq, type, dur, vol = 0.35) {
    try {
      const ac = getAC();
      const o = ac.createOscillator(), g = ac.createGain();
      o.connect(g); g.connect(ac.destination);
      o.type = type; o.frequency.value = freq;
      g.gain.setValueAtTime(vol, ac.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
      o.start(); o.stop(ac.currentTime + dur);
    } catch(e) {}
  }

  function checkDiff(id, event) {
    // Basic deduplication. Sync block isSimulating automatic aayi handle cheyyunnu.
    if (foundDiffs.has(id)) return;
    foundDiffs.add(id);

    // Shabdam: nalla chime
    playBeep(523, 'sine', 0.1, 0.4);
    setTimeout(() => playBeep(659, 'sine', 0.15, 0.35), 100);
    setTimeout(() => playBeep(784, 'sine', 0.25, 0.3),  200);

    // Randu panelilum ring kanikkuka
    document.querySelectorAll(`.marker-${id}`).forEach(m => m.classList.add('found'));

    // Floating badge position kanakkakkunnu: 
    // Frameworkil ninnulla replayed click aanenkil SVG element-te center edukka.
    let x, y;
    if (event && event.isTrusted && event.clientX) {
        x = event.clientX;
        y = event.clientY;
    } else if (event && event.currentTarget) {
        const rect = event.currentTarget.getBoundingClientRect();
        x = rect.left + (rect.width / 2);
        y = rect.top + (rect.height / 2);
    }

    if (x && y) showBadge(x, y);

    // Cheriya confetti burst
    confetti({ particleCount: 25, spread: 50, origin: { y: 0.5 }, zIndex: 100 });

    updateScore();
    if (foundDiffs.size === TOTAL_DIFFS) {
      setTimeout(triggerWin, 600);
    }
  }

  function showBadge(x, y) {
    const badge = document.createElement('div');
    badge.className = 'found-badge';
    badge.textContent = '✓ Kandethi!';
    badge.style.left = x + 'px';
    badge.style.top  = y + 'px';
    document.body.appendChild(badge);
    setTimeout(() => badge.remove(), 1250);
  }

  function updateScore() {
    const d = document.getElementById('score-display');
    d.innerText = `${foundDiffs.size} / ${TOTAL_DIFFS}`;
    d.classList.remove('pop-in');
    void d.offsetWidth;
    d.classList.add('pop-in');
  }

  function triggerWin() {
    // Vijayathinte shabdam
    [523, 659, 784, 1047, 1319].forEach((f, i) =>
      setTimeout(() => playBeep(f, 'sine', 0.3, 0.3), i * 140)
    );
    // Confetti burst
    const end = Date.now() + 3000;
    (function frame() {
      confetti({ particleCount: 8, angle: 60,  spread: 55, origin: { x: 0 }, colors: ['#3b82f6','#10b981','#f59e0b'] });
      confetti({ particleCount: 8, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#3b82f6','#10b981','#f59e0b'] });
      if (Date.now() < end) requestAnimationFrame(frame);
    }());
    const modal = document.getElementById('victory-modal');
    modal.classList.remove('hidden');
    modal.classList.add('flex');
  }

  function resetGame() {
    foundDiffs.clear();
    document.querySelectorAll('.diff-marker').forEach(m => m.classList.remove('found'));
    updateScore();
    const modal = document.getElementById('victory-modal');
    modal.classList.add('hidden');
    modal.classList.remove('flex');
  }
</script>
</body>
</html>
