<!-- ============================================================
     PART 1 — SYNC BLOCK (RESPONSIVE FIX)
     ============================================================ -->
<script>
  window.isSimulating = false;
  const urlParams = new URLSearchParams(window.location.search || window.location.hash.replace('#','?'));
  const roomId = urlParams.get('room') || '54321';
  let localSeed = 0;
  window.setSeed = function(str) {
    let t = 0;
    for (let i = 0; i < str.length; i++) {
      t = str.charCodeAt(i) + ((t << 5) - t);
    }
    localSeed = Math.abs(t);
  };
  window.setSeed(roomId);
  window.seededRandom = function() {
    let x = Math.sin(localSeed++) * 10000;
    return x - Math.floor(x);
  };
  
  function getUniqueSelector(el) {
    if (!el) return null;
    if (el.id) return '#' + el.id;
    if (el === document.body) return 'body';
    let path = [];
    while (el && el.nodeType === Node.ELEMENT_NODE) {
      let sel = el.nodeName.toLowerCase();
      if (el.id) { sel = '#' + el.id; path.unshift(sel); break; }
      else {
        if (el.className && typeof el.className === 'string') {
          const cls = Array.from(el.classList)
            .filter(c => !c.includes(':') && !c.includes('[') && !c.includes('/'))
            .join('.');
          if (cls) sel += '.' + cls;
        }
        let sib = el, nth = 1;
        while (sib = sib.previousElementSibling)
          if (sib.nodeName.toLowerCase() === el.nodeName.toLowerCase()) nth++;
        sel += ':nth-of-type(' + nth + ')';
        path.unshift(sel);
      }
      el = el.parentNode;
    }
    return path.join(' > ');
  }

  let actionIdCounter = 0;
  document.addEventListener('click', (e) => {
    if (e.isTrusted === false || window.isSimulating) return;
    const sel = getUniqueSelector(e.target);
    if (!sel) return;
    actionIdCounter++;
    window.parent.postMessage({
      type: 'IFRAME_ACTION_TRIGGERED',
      payload: { type: 'UNIVERSAL_CLICK', selector: sel, seed: localSeed, actionId: 'click_' + actionIdCounter + '_' + Date.now() }
    }, '*');
  }, true);
  
  let lastCursorTime = 0;
  document.addEventListener('mousemove', (e) => {
    const now = Date.now();
    if (now - lastCursorTime < 40) return;
    lastCursorTime = now;
    window.parent.postMessage({
      type: 'IFRAME_MOUSE_TRACK',
      pctX: (e.clientX / window.innerWidth) * 100,
      pctY: (e.clientY / window.innerHeight) * 100
    }, '*');
  });
  
  let lastTouchTime = 0;
  document.addEventListener('touchmove', (e) => {
    if (e.touches.length === 0) return;
    const now = Date.now();
    if (now - lastTouchTime < 40) return;
    lastTouchTime = now;
    window.parent.postMessage({
      type: 'IFRAME_MOUSE_TRACK',
      pctX: (e.touches[0].clientX / window.innerWidth) * 100,
      pctY: (e.touches[0].clientY / window.innerHeight) * 100
    }, '*');
  }, { passive: true });
  
  // 🔥 MEGA FIX: Replaced aggressive scaling with gentle dimension management
  function applyScale() {
      // In this specific game, CSS Flexbox handles the scaling perfectly.
      // We only ensure overflow behaves nicely.
      document.body.style.transform = 'none';
      document.body.style.width = '100%';
      document.body.style.height = '100%';
  }
  window.addEventListener('resize', applyScale);
  window.addEventListener('load', applyScale);
  
  let lastProcessedActionId = null;
  window.addEventListener('message', (event) => {
    if (event.data?.type === 'EXECUTE_UNIVERSAL_ACTION') {
      const action = event.data.action;
      if (action.type === 'UNIVERSAL_CURSOR') return; 
      
      const currentActionId = action.actionId || action.timestamp;
      if (currentActionId && currentActionId === lastProcessedActionId) return;
      lastProcessedActionId = currentActionId;
      
      window.isSimulating = true;
      if (action.seed !== undefined) localSeed = action.seed;
      if (action.type === 'UNIVERSAL_CLICK') {
        const el = document.querySelector(action.selector);
        if (el) el.click();
      }
      setTimeout(() => { window.isSimulating = false; }, 50);
    }
  });
</script>

<script>
/* =========================================
   LIVETUTOR COMPLIANT SHUFFLE
========================================= */
function shuf(arr) {
    arr = [...arr];
    for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(window.seededRandom() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}

/* =========================================
   SMART IMAGE SCANNER
   Tries .png, .jpg, .gif, .webp automatically!
========================================= */
function applySmartImage(imgEl, basePath, word, size) {
    const exts = ['.png', '.jpg', '.jpeg', '.gif', '.webp', '.avif'];
    let idx = 0;
    
    // Clear old src first
    imgEl.src = '';
    
    imgEl.onerror = () => {
        idx++;
        if (idx < exts.length) {
            imgEl.src = basePath + exts[idx];
        } else {
            // Fallback if image literally doesn't exist
            imgEl.src = `https://placehold.co/${size}x${size}/eee/999?text=` + encodeURIComponent(word);
        }
    };
    // Trigger the first attempt
    imgEl.src = basePath + exts[0];
}


/* =========================================
   NAMES DATABASE (No extensions needed!)
========================================= */
const RAW_NAMES = [
    'aeroplane', 'ant', 'ballon', 'bee', 'car', 'cat', 'doll', 'dolphine', 
    'eagel', 'eye', 'fox', 'frog', 'goat', 'hat', 'horse', 'icecream', 
    'injection', 'jelly fish', 'juice', 'kangaroo', 'kite', 'lion', 
    'mango', 'monkey', 'nest', 'notebook', 'onion', 'owl', 'panda', 
    'pencil', 'quail', 'queen', 'rabbit', 'rat', 'santa', 'spider', 
    'table', 'truck', 'ubmerla', 'umbralla', 'van', 'vegetables', 
    'watermelon', 'world', 'xmas tree', 'xray', 'yarwn', 'york', 
    'zerba', 'ziga'
];

let allImages = [];

// Auto-process names into objects
function buildDatabase() {
    RAW_NAMES.forEach((name, index) => {
        let word = name.replace(/[_\-]/g, ' ').trim();
        let capWord = word.charAt(0).toUpperCase() + word.slice(1).toLowerCase();
        let letter = capWord.charAt(0);
        
        allImages.push({
            id: 'img-' + index + '-' + word.replace(/\s+/g, '-').toLowerCase(),
            basePath: 'images/' + name, // Store path WITHOUT extension
            word: capWord,
            letter: letter
        });
    });
    // Sort alphabetically
    allImages.sort((a, b) => a.word.localeCompare(b.word));
}

/* =========================================
   STATE & DATA
========================================= */
const AZ = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
const PALETTE = ['#FF6B9D','#F97316','#F5A623','#22C55E','#4A90D9','#8B5CF6','#EF4444','#00C896','#00B4D8'];
const GROUPS = [

    { id: 'g2', label: 'E – H', letters: ['E','F','G','H'], color: 'linear-gradient(135deg, #4A90D9, #00C896)' },
    { id: 'g3', label: 'I – L', letters: ['I','J','K','L'], color: 'linear-gradient(135deg, #8B5CF6, #C44AE0)' },
    { id: 'g4', label: 'M – P', letters: ['M','N','O','P'], color: 'linear-gradient(135deg, #F97316, #EF4444)' },
    { id: 'g5', label: 'Q – T', letters: ['Q','R','S','T'], color: 'linear-gradient(135deg, #22C55E, #4A90D9)' },
    { id: 'g6', label: 'U – Z', letters: ['U','V','W','X','Y','Z'], color: 'linear-gradient(135deg, #F5A623, #FF6B9D)' }
];

function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

/* =========================================
   UI BUILDERS
========================================= */
function buildMenu() {
    const cont = document.getElementById('groups-container');
    cont.innerHTML = '';
    GROUPS.forEach(g => {
        const btn = document.createElement('button');
        btn.id = 'btn-grp-' + g.id;
        btn.className = 'btn-3d btn-group';
        btn.style.background = g.color;
        btn.innerHTML = `<span style="font-size:1.4rem; font-weight:900;">${g.label}</span>`;
        btn.onclick = () => openGroupSelection(g);
        cont.appendChild(btn);
    });
}

function createBubbles() {
    const wrap = document.getElementById('bubbles');
    const cols = ['#FFB3D1', '#B3F0E0', '#B3D9FF', '#FFE8A3', '#D4B3FF'];
    // Visual only, Math.random is safe here
    for(let i=0; i<15; i++) {
        const b = document.createElement('div'); b.className = 'bubble';
        const sz = 20 + Math.random()*40;
        b.style.cssText = `width:${sz}px; height:${sz}px; left:${Math.random()*100}vw; background:${cols[i%cols.length]}; animation-duration:${10+Math.random()*10}s; animation-delay:${-Math.random()*15}s;`;
        wrap.appendChild(b);
    }
}

/* =========================================
   GROUP SELECTION LOGIC
========================================= */
window.openGroupSelection = function(group) {
    currentGroupLetters = group.letters;
    document.getElementById('sel-group-title').textContent = `Group ${group.label}`;
    
    // Filter available images for these letters
    availableGroupImages = allImages.filter(img => currentGroupLetters.includes(img.letter));
    
    selectedImageIds.clear();
    // Default select all
    availableGroupImages.forEach(img => selectedImageIds.add(img.id));
    
    renderSelectGrid();
    showScreen('scr-select');
    playTone(400, 'sine', 0.1);
}

function renderSelectGrid() {
    const grid = document.getElementById('select-grid');
    grid.innerHTML = '';
    
    availableGroupImages.forEach(img => {
        const isSel = selectedImageIds.has(img.id);
        const div = document.createElement('div');
        div.id = 'sel-card-' + img.id; // MANDATORY UNIQUE ID
        div.className = `sel-card ${isSel ? 'selected' : ''}`;
        
        div.onclick = () => {
            if(selectedImageIds.has(img.id)) selectedImageIds.delete(img.id);
            else selectedImageIds.add(img.id);
            renderSelectGrid();
            playTone(isSel ? 300 : 500, 'sine', 0.1);
        };
        
        div.innerHTML = `
            <div class="check"><i class="fas fa-check"></i></div>
            <img class="db-img smart-grid-img" id="img-thumb-${img.id}">
            <div class="db-name">${img.word}</div>
        `;
        grid.appendChild(div);
        
        // Trigger smart image loader
        const imgEl = div.querySelector('img');
        applySmartImage(imgEl, img.basePath, img.word, 100);
    });
    
    const btn = document.getElementById('btn-start-quiz');
    if (selectedImageIds.size > 0) {
        btn.textContent = `▶ Play Quiz (${selectedImageIds.size})`;
        btn.classList.remove('inactive');
    } else {
        btn.textContent = `Select at least 1 image`;
        btn.classList.add('inactive');
    }
}

window.toggleSelectAll = function() {
    if(selectedImageIds.size === availableGroupImages.length) {
        selectedImageIds.clear();
    } else {
        availableGroupImages.forEach(img => selectedImageIds.add(img.id));
    }
    renderSelectGrid();
    playTone(400, 'sine', 0.1);
}

/* =========================================
   QUIZ LOGIC (MISSING LETTER ONLY)
========================================= */
window.startQuiz = function() {
    if(selectedImageIds.size === 0) return;
    
    let chosenImages = availableGroupImages.filter(img => selectedImageIds.has(img.id));
    
    // Create interleaved sequence based on letters (e.g. A1, B1, C1, A2, B2)
    let grouped = {};
    currentGroupLetters.forEach(l => grouped[l] = []);
    chosenImages.forEach(img => { if(grouped[img.letter]) grouped[img.letter].push(img); });
    
    quizQueue = [];
    let maxLen = Math.max(...Object.values(grouped).map(arr => arr.length));
    for(let i=0; i<maxLen; i++) {
        currentGroupLetters.forEach(l => {
            if(grouped[l] && grouped[l][i]) quizQueue.push(grouped[l][i]);
        });
    }
    
    qIdx = 0;
    showScreen('scr-quiz');
    loadQuizCard();
}

function loadQuizCard() {
    if(qIdx >= quizQueue.length) {
        showWin();
        return;
    }
    
    isAnimating = false;
    const imgData = quizQueue[qIdx];
    const correctLetter = imgData.letter;
    const restOfWord = imgData.word.slice(1);
    
    document.getElementById('q-progress').textContent = `${qIdx + 1} / ${quizQueue.length}`;
    
    // Smart Image Loader
    const imgEl = document.getElementById('q-image');
    applySmartImage(imgEl, imgData.basePath, imgData.word, 200);
    
    const themeCol = PALETTE[AZ.indexOf(correctLetter) % PALETTE.length];
    document.getElementById('q-color-wrap').style.borderColor = themeCol;
    
    // Set Word
    document.getElementById('q-word-display').innerHTML = `
        <span class="q-blank" id="lbl-blank" style="color:${themeCol}; border-color:${themeCol}">_</span> 
        <span>${restOfWord}</span>
    `;
    
    // Generate Options using SEEDED RANDOM
    let wrongLetters = AZ.filter(l => l !== correctLetter);
    wrongLetters = shuf(wrongLetters); // LIVETUTOR SHUFFLE
    
    let options = [correctLetter, wrongLetters[0], wrongLetters[1], wrongLetters[2]];
    options = shuf(options); // LIVETUTOR SHUFFLE
    
    const optCont = document.getElementById('q-options-container');
    optCont.innerHTML = '';
    
    options.forEach((opt, idx) => {
        const btn = document.createElement('button');
        btn.id = 'btn-opt-' + idx; // MANDATORY UNIQUE ID
        btn.className = 'btn-opt';
        const btnCol = PALETTE[(AZ.indexOf(correctLetter) + idx) % PALETTE.length];
        btn.style.background = btnCol;
        btn.style.boxShadow = `0 4px 0 ${adjustColor(btnCol, -40)}, 0 8px 15px rgba(0,0,0,0.1)`;
        btn.textContent = opt;
        
        btn.onclick = () => checkAnswer(opt, correctLetter, btn.id);
        optCont.appendChild(btn);
    });
}

window.checkAnswer = function(chosen, correct, btnId) {
    if(isAnimating) return;
    
    const btn = document.getElementById(btnId);
    if (!btn) return;
    
    isAnimating = true;
    
    if(chosen === correct) {
        // Correct
        btn.classList.add('correct');
        const blank = document.getElementById('lbl-blank');
        blank.textContent = correct;
        blank.style.borderBottomColor = 'transparent';
        
        playSfxMatch();
        try { confetti({ particleCount: 60, spread: 70, origin: { y: 0.6 } }); } catch(e){}
        
        setTimeout(() => {
            qIdx++;
            loadQuizCard();
        }, 1200);
    } else {
        // Wrong
        btn.classList.add('wrong');
        playTone(200, 'sawtooth', 0.2);
        setTimeout(() => { playTone(150, 'sawtooth', 0.3); }, 150);
        
        setTimeout(() => {
            btn.classList.remove('wrong');
            isAnimating = false;
        }, 500);
    }
}

function showWin() {
    showScreen('scr-win');
    playSfxWin();
    const dur = 3000, end = Date.now() + dur;
    (function frame() {
        try {
            confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0 }, colors: PALETTE });
            confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1 }, colors: PALETTE });
        } catch(e){}
        if (Date.now() < end) requestAnimationFrame(frame);
    }());
}

/* =========================================
   REWARDS SYSTEM (STAR & ICECREAM)
========================================= */
let rewards = { star: 0, ice: 0 };

window.giveReward = function(type) {
    if(rewards[type] < 3) {
        rewards[type]++;
        updateRewardsUI();
        if(type==='star') { playTone(880, 'sine', 0.1); setTimeout(() => playTone(1108, 'sine', 0.3), 100); }
        else { playSfxMatch(); }
        try { confetti({ particleCount: 40, spread: 60, origin: { y: 0.9 }, zIndex: 9999 }); } catch(e){}
        
        // Bounce the icon
        const icon = document.getElementById(`t${type.charAt(0)}-${rewards[type]}`);
        icon.style.transform = 'scale(1.5)';
        setTimeout(() => icon.style.transform = 'none', 300);
    }
}

window.resetRewards = function() {
    rewards = { star: 0, ice: 0 };
    updateRewardsUI();
    playTone(400, 'sine', 0.1);
}

function updateRewardsUI() {
    for(let i=1; i<=3; i++) {
        document.getElementById(`ts-${i}`).classList.toggle('active', i <= rewards.star);
        document.getElementById(`ti-${i}`).classList.toggle('active', i <= rewards.ice);
    }
}

/* =========================================
   AUDIO & UTILS
========================================= */
function adjustColor(color, amount) {
    return '#' + color.replace(/^#/, '').replace(/../g, color => ('0'+Math.min(255, Math.max(0, parseInt(color, 16) + amount)).toString(16)).substr(-2));
}

let audioCtx;
function initAudio() { if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
function playTone(freq, type, duration) {
    try {
        initAudio();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + duration);
    } catch(e) {}
}
function playSfxMatch() {
    [523, 659, 784].forEach((f, i) => setTimeout(() => playTone(f, 'sine', 0.2), i * 100));
}
function playSfxWin() {
    [[523,0], [659,150], [784,300], [1046,450], [784,650], [1046,800]].forEach(([f, d]) => setTimeout(() => playTone(f, 'triangle', 0.3), d));
}
