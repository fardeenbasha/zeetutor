<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>body parts – Odd One Out</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <script>
        window.isSimulating = false;

        const urlParams = new URLSearchParams(window.location.search || window.location.hash.replace('#', '?'));
        const roomId = urlParams.get('room') || '54321';

        let localSeed = 0;

        window.setSeed = function(str) {
            let t = 0;
            for (let i = 0; i < str.length; i++) t = str.charCodeAt(i) + ((t << 5) - t);
            localSeed = Math.abs(t);
        };
        window.setSeed(roomId);

        window.seededRandom = function() {
            let x = Math.sin(localSeed++) * 10000;
            return x - Math.floor(x);
        };

        function getUniqueSelector(el) {
            if (!el) return null;
            if (el.id) return '#' + el.id;
            if (el === document.body) return 'body';
            let path = [];
            while (el && el.nodeType === Node.ELEMENT_NODE) {
                let sel = el.nodeName.toLowerCase();
                if (el.id) { sel = '#' + el.id; path.unshift(sel); break; }
                if (el.className) {
                    const cls = Array.from(el.classList)
                        .filter(c => !c.includes(':') && !c.includes('[') && !c.includes(']') && !c.includes('/'))
                        .join('.');
                    if (cls) sel += '.' + cls;
                }
                let sib = el, nth = 1;
                while (sib = sib.previousElementSibling)
                    if (sib.nodeName.toLowerCase() === el.nodeName.toLowerCase()) nth++;
                sel += ':nth-of-type(' + nth + ')';
                path.unshift(sel);
                el = el.parentNode;
            }
            return path.join(' > ');
        }

        let actionIdCounter = 0;
        document.addEventListener('click', (e) => {
            if (e.isTrusted === false || window.isSimulating) return;
            const selector = getUniqueSelector(e.target);
            if (!selector) return;
            actionIdCounter++;
            window.parent.postMessage({
                type: 'IFRAME_ACTION_TRIGGERED',
                payload: {
                    type: 'UNIVERSAL_CLICK',
                    selector: selector,
                    seed: localSeed,
                    actionId: 'click_' + actionIdCounter + '_' + Date.now()
                }
            }, '*');
        }, true);

        // ==========================================
        //  RELATIVE CARD COORDINATE TRACKING (SHOOT)
        // ==========================================
        let lastCursorTime = 0;
        function handleRelativePointerMove(e) {
            const cardEl = document.querySelector('.card');
            if (!cardEl || window.isSimulating) return;

            const now = Date.now();
            if (now - lastCursorTime < 45) return;
            lastCursorTime = now;

            const rect = cardEl.getBoundingClientRect();
            let clientX, clientY;
            if (e.touches && e.touches.length > 0) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }

            // Convert raw screen coords to layout card percentage values
            const pctX = ((clientX - rect.left) / rect.width) * 100;
            const pctY = ((clientY - rect.top) / rect.height) * 100;

            if (pctX >= 0 && pctX <= 100 && pctY >= 0 && pctY <= 100) {
                window.parent.postMessage({
                    type: 'IFRAME_MOUSE_TRACK',
                    pctX: pctX,
                    pctY: pctY
                }, '*');
            }
        }

        document.addEventListener('mousemove', handleRelativePointerMove);
        document.addEventListener('touchmove', handleRelativePointerMove, { passive: true });

        // ==========================================
        //  REPLAY HANDLER & SKINNED DESERIALIZATION
        // ==========================================
        let lastProcessedActionId = null;
        window.addEventListener('message', (event) => {
            if (!event.data) return;

            const cardEl = document.querySelector('.card');

            // Render cursor inside relative boundaries
            if (event.data.type === 'EXECUTE_UNIVERSAL_ACTION') {
                const action = event.data.action;
                if (!action) return;

                if (action.type === 'UNIVERSAL_CURSOR') {
                    if (cardEl) {
                        const rect = cardEl.getBoundingClientRect();
                        const targetX = rect.left + (action.pctX / 100) * rect.width;
                        const targetY = rect.top + (action.pctY / 100) * rect.height;

                        const remoteCursor = document.getElementById('remote-cursor');
                        if (remoteCursor) {
                            remoteCursor.style.left = targetX + 'px';
                            remoteCursor.style.top = targetY + 'px';
                            remoteCursor.style.display = 'block';
                        }
                    }
                    return;
                }

                const currentActionId = action.actionId || action.timestamp;
                if (currentActionId && currentActionId === lastProcessedActionId) return;
                lastProcessedActionId = currentActionId;

                window.isSimulating = true;
                if (action.seed !== undefined) localSeed = action.seed;
                
                if (action.type === 'UNIVERSAL_CLICK') {
                    const el = document.querySelector(action.selector);
                    if (el) el.click();
                }
                setTimeout(() => { window.isSimulating = false; }, 50);
            }
        });
    </script>

    <style>
        *{box-sizing:border-box;margin:0;padding:0;user-select:none;}
        html,body{
            width:100%;
            min-height:100vh;
            overflow-x:hidden;
            overflow-y:auto; /* Allow scroll instead of scale compression */
            font-family:'Nunito',sans-serif;
            background:linear-gradient(135deg,#4c1d95 0%,#1e40af 50%,#0f766e 100%);
            display:flex;
            flex-direction:column;
            align-items:center;
            justify-content:center;
            touch-action:manipulation;
            padding: 1rem 0.5rem;
        }
        body::before{content:'';position:fixed;inset:0;
            background:radial-gradient(circle at 15% 25%,rgba(255,107,107,.18) 0%,transparent 45%),
                       radial-gradient(circle at 85% 75%,rgba(78,205,196,.18) 0%,transparent 45%);
            pointer-events:none;}
        
        /* Rigid constraints replaced with organic margins and maximum boundaries */
        .card{
            background:rgba(255,255,255,.97);
            border-radius:1.5rem;
            padding:1.5rem;
            box-shadow:0 12px 50px rgba(0,0,0,.22);
            width:96%;
            max-width:820px;
            display:flex;
            flex-direction:column;
            border-top:8px solid #A855F7;
            position:relative;
            z-index:1;
            margin: auto;
        }
        h1{font-family:'Fredoka One',cursive;font-size:1.8rem;
            background:linear-gradient(135deg,#A855F7,#3B82F6);
            -webkit-background-clip:text;-webkit-text-fill-color:transparent;
            background-clip:text;margin-bottom:.15rem;flex-shrink:0;}
        .hdr{display:flex;justify-content:space-between;align-items:center;
            flex-wrap:wrap;gap:1rem;margin-bottom:1rem;flex-shrink:0;}
        .star-ctr{background:linear-gradient(135deg,#FFE66D,#F97316);border-radius:2rem;
            padding:.4rem 1rem;font-family:'Fredoka One',cursive;color:white;
            box-shadow:0 4px 14px rgba(249,115,22,.4);display:flex;align-items:center;gap:.35rem;}
        .prog-bar{height:11px;background:#E2E8F0;border-radius:8px;overflow:hidden;
            margin-bottom:.75rem;flex-shrink:0;}
        .prog-fill{height:100%;background:linear-gradient(90deg,#4ECDC4,#A855F7);
            border-radius:8px;transition:width .5s;}
        .prog-lbl{display:flex;justify-content:space-between;
            font-family:'Fredoka One',cursive;color:#94A3B8;
            margin-bottom:.35rem;font-size:.9rem;flex-shrink:0;}
        #ga{flex:1;display:flex;flex-direction:column;min-height:0;justify-content:center;}
        .q-wrap{display:flex;flex-direction:column;align-items:center;
            margin-bottom:1rem;gap:.75rem;flex-shrink:0;}
        .q-img,.q-vid{width:160px;height:160px;object-fit:contain;border-radius:1.2rem;
            border:5px solid transparent;
            background:linear-gradient(white,white) padding-box,
                       linear-gradient(135deg,#A855F7,#3B82F6) border-box;
            box-shadow:0 8px 28px rgba(168,85,247,.3);}
        .q-vid{background:linear-gradient(#111,#111) padding-box,
                           linear-gradient(135deg,#A855F7,#3B82F6) border-box;}
        .q-txt{font-family:'Fredoka One',cursive;font-size:1.6rem;
            color:#3B82F6;text-align:center;}

        /* Fluid CSS Grid grid replaces hard-scaled layouts for mobile responsive views */
        .opts{
            display:grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap:1rem;
            width:100%;
            max-width:760px;
            margin:0 auto;
            justify-content:center;
        }
        .opt{
            background:#F8FAFC;
            border-radius:1rem;
            padding:.55rem;
            border:4px solid transparent;
            cursor:pointer;
            transition:transform .2s,border-color .2s,box-shadow .2s;
            box-shadow:0 4px 12px rgba(0,0,0,.1);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .opt:hover{transform:scale(1.04);}
        .opt img,.opt video{width:100%;aspect-ratio:1;object-fit:contain;
            border-radius:.5rem;display:block;pointer-events:none;}
        .opt video{background:#000;}
        .opt.correct{border-color:#22C55E;transform:scale(1.08);
            box-shadow:0 8px 25px rgba(34,197,94,.45);}
        .opt.wrong{border-color:#EF4444;animation:shake .5s;
            box-shadow:0 6px 20px rgba(239,68,68,.35);}
        @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-9px)}75%{transform:translateX(9px)}}
        .end{text-align:center;padding:1.5rem .5rem;}
        .end h2{font-family:'Fredoka One',cursive;font-size:2rem;color:#A855F7;margin:.6rem 0;}
        .btn{display:inline-flex;align-items:center;gap:.35rem;border:none;border-radius:1rem;
            font-family:'Fredoka One',cursive;font-size:1rem;cursor:pointer;
            padding:.7rem 1.4rem;transition:transform .15s;color:white;margin:.3rem;}
        .btn-p{background:linear-gradient(135deg,#A855F7,#7C3AED);
            box-shadow:0 4px 15px rgba(168,85,247,.4);}
    </style>
</head>

        let gd_play = [], ci = 0, sc = 0;

        function isVid(s){ return typeof s==='string'&&(s.startsWith('data:video')||s.includes('video/')); }
        function mkMedia(src, cls){
            if(isVid(src)){
                const v=document.createElement('video');
                v.src=src; v.className=cls; v.autoplay=true; v.loop=true; v.muted=true; v.playsInline=true;
                v.style.pointerEvents='none'; return v;
            } else {
                const i=document.createElement('img');
                i.src=src; i.className=cls; i.style.pointerEvents='none'; return i;
            }
        }

        function shuf(a){
            let arr=[...a];
            for(let i=arr.length-1;i>0;i--){
                const j=Math.floor(window.seededRandom()*(i+1));
                [arr[i],arr[j]]=[arr[j],arr[i]];
            }
            return arr;
        }

        function snd_win(){ try{ const A=new(window.AudioContext||window.webkitAudioContext)(); const n=(f,t,dur,tp='sine',v=0.4)=>{const o=A.createOscillator(),g=A.createGain();o.type=tp;o.frequency.setValueAtTime(f,A.currentTime+t);g.gain.setValueAtTime(0,A.currentTime+t);g.gain.linearRampToValueAtTime(v,A.currentTime+t+.05);g.gain.exponentialRampToValueAtTime(.001,A.currentTime+t+dur);o.connect(g);g.connect(A.destination);o.start(A.currentTime+t);o.stop(A.currentTime+t+dur+.05);}; [[523,0],[659,.1],[784,.2],[1047,.32],[1319,.44]].forEach(([f,t])=>n(f,t,.45)); }catch(e){} }
        function snd_bad(){ try{ const A=new(window.AudioContext||window.webkitAudioContext)(); const o=A.createOscillator(),g=A.createGain(); o.type='sawtooth';o.frequency.setValueAtTime(220,A.currentTime);o.frequency.exponentialRampToValueAtTime(55,A.currentTime+.4); g.gain.setValueAtTime(.4,A.currentTime);g.gain.exponentialRampToValueAtTime(.001,A.currentTime+.4); o.connect(g);g.connect(A.destination);o.start();o.stop(A.currentTime+.45); }catch(e){} }
        function snd_end(){ try{ const A=new(window.AudioContext||window.webkitAudioContext)(); [[523,0],[659,.15],[784,.3],[1047,.45],[784,.65],[880,.72],[1047,.84],[1319,1.0]].forEach(([f,t])=>{ const o=A.createOscillator(),g=A.createGain();o.type='sine';o.frequency.setValueAtTime(f,A.currentTime+t); g.gain.setValueAtTime(0,A.currentTime+t);g.gain.linearRampToValueAtTime(.5,A.currentTime+t+.05);g.gain.exponentialRampToValueAtTime(.001,A.currentTime+t+.6); o.connect(g);g.connect(A.destination);o.start(A.currentTime+t);o.stop(A.currentTime+t+.65); }); }catch(e){} }
        function cft(big){ const end=Date.now()+(big?3500:2200); const cols=['#FF6B6B','#FFE66D','#4ECDC4','#A855F7','#EC4899','#F97316','#22C55E']; (function f(){confetti({particleCount:big?14:8,angle:60,spread:72,origin:{x:0},colors:cols});confetti({particleCount:big?14:8,angle:120,spread:72,origin:{x:1},colors:cols});if(Date.now()<end)requestAnimationFrame(f);})(); }

        let q_ref = null;

        function load(){
            window.setSeed(roomId + '_q_' + ci);
            q_ref = gd_play[ci];
            const q = q_ref;
            const qw = document.getElementById('qw'); qw.innerHTML='';
            document.getElementById('pt').textContent = (ci+1) + ' / ' + gd_play.length;
            document.getElementById('pf').style.width = Math.round((ci/gd_play.length)*100) + '%';

            if(q.prompt){ const t=document.createElement('div'); t.className='q-txt'; t.textContent=q.prompt; qw.appendChild(t); }
            if(q.q){ qw.appendChild(mkMedia(q.q, isVid(q.q)?'q-vid':'q-img')); }

            const oc = document.getElementById('oc'); oc.innerHTML='';
            const shuffledOptions = shuf(q.options);
            shuffledOptions.forEach((opt, idx) => {
                const card = document.createElement('div');
                card.className = 'opt';
                card.id = 'opt-card-' + idx;
                card.appendChild(mkMedia(opt,''));
                card.onclick = () => {
                    if(card.dataset.locked && !window.isSimulating) return;
                    [...oc.children].forEach(c => c.dataset.locked='1');
                    if(opt === q_ref.a){
                        card.classList.add('correct'); snd_win(); cft(false);
                        sc++; document.getElementById('sc').textContent = sc;
                        setTimeout(() => {
                            [...oc.children].forEach(c => delete c.dataset.locked);
                            ci++;
                            if(ci < gd_play.length){ load(); }
                            else {
                                snd_end(); cft(true);
                                document.getElementById('pf').style.width='100%';
                                document.getElementById('pt').textContent='Done! 🎉';
                                document.getElementById('ga').style.display='none';
                                document.getElementById('fs').textContent=sc;
                                document.getElementById('es').style.display='block';
                            }
                        }, 1900);
                    } else {
                        card.classList.add('wrong'); snd_bad();
                        setTimeout(() => { card.classList.remove('wrong'); [...oc.children].forEach(c => delete c.dataset.locked); }, 650);
                    }
                };
                oc.appendChild(card);
            });
        }

        function init(){
            ci=0; sc=0;
            document.getElementById('sc').textContent='0';
            document.getElementById('es').style.display='none';
            document.getElementById('ga').style.display='flex';
            window.setSeed(roomId + '_init');
            gd_play = shuf(gd);
            load();
        }
        init();
    </script>
