<!-- ============================================================
     PART 1 — LIVETUTOR SYNC BLOCK (ULTIMATE MASTER)
     ============================================================ -->
<script>
  window.isSimulating = false;
  const urlParams = new URLSearchParams(window.location.search || window.location.hash.replace('#','?'));
  const roomId = urlParams.get('room') || '54321';
  let localSeed = 0;
  
  window.setSeed = function(str) {
      let tempSeed = 0;
      for (let i = 0; i < str.length; i++) { tempSeed = str.charCodeAt(i) + ((tempSeed << 5) - tempSeed); }
      localSeed = Math.abs(tempSeed);
  };
  window.setSeed(roomId);
  
  window.seededRandom = function() {
      let x = Math.sin(localSeed++) * 10000;
      return x - Math.floor(x);
  };
  Math.random = window.seededRandom;

  function getUniqueSelector(el) {
      if (!el) return null;
      if (el.id) return '#' + el.id;
      if (el === document.body) return 'body';
      let path = [];
      while (el && el.nodeType === Node.ELEMENT_NODE) {
          let selector = el.nodeName.toLowerCase();
          if (el.id) { selector = '#' + el.id; path.unshift(selector); break; } 
          else {
              if (el.className && typeof el.className === 'string') {
                  const classes = Array.from(el.classList).filter(c => !c.includes(':') && !c.includes('[') && !c.includes('/')).join('.');
                  if (classes) selector += '.' + classes;
              }
              let sibling = el, nth = 1;
              while (sibling = sibling.previousElementSibling) { if (sibling.nodeName.toLowerCase() === el.nodeName.toLowerCase()) nth++; }
              selector += ':nth-of-type(' + nth + ')';
              path.unshift(selector);
          }
          el = el.parentNode;
      }
      return path.join(' > ');
  }

  let actionIdCounter = 0;
  document.addEventListener('click', (e) => {
      if (e.isTrusted === false || window.isSimulating) return;
      const selector = getUniqueSelector(e.target); if (!selector) return;
      actionIdCounter++;
      window.parent.postMessage({
          type: 'IFRAME_ACTION_TRIGGERED',
          payload: { type: 'UNIVERSAL_CLICK', selector: selector, seed: localSeed, actionId: 'click_' + actionIdCounter + '_' + Date.now() }
      }, '*');
  }, true);

  let lastCursorTime = 0;
  document.addEventListener('mousemove', (e) => {
      const now = Date.now(); if (now - lastCursorTime < 40) return; lastCursorTime = now;
      window.parent.postMessage({ type: 'IFRAME_ACTION_TRIGGERED', payload: { type: 'UNIVERSAL_CURSOR', pctX: (e.clientX / window.innerWidth) * 100, pctY: (e.clientY / window.innerHeight) * 100 } }, '*');
  });

  document.addEventListener('touchmove', (e) => {
      if (e.touches.length > 0) {
          const now = Date.now(); if (now - lastCursorTime < 40) return; lastCursorTime = now;
          window.parent.postMessage({ type: 'IFRAME_ACTION_TRIGGERED', payload: { type: 'UNIVERSAL_CURSOR', pctX: (e.touches[0].clientX / window.innerWidth) * 100, pctY: (e.touches[0].clientY / window.innerHeight) * 100 } }, '*');
      }
  }, { passive: true });

  let lastProcessedActionId = null;
  window.addEventListener('message', (event) => {
      if (event.data && event.data.type === 'EXECUTE_UNIVERSAL_ACTION') {
          const action = event.data.action;
          if (action.type === 'UNIVERSAL_CURSOR') {
              const c = document.getElementById('remote-cursor');
              if (c) {
                  c.style.left = (action.pctX / 100 * window.innerWidth) + 'px';
                  c.style.top = (action.pctY / 100 * window.innerHeight) + 'px';
                  c.style.display = 'block';
              }
              return;
          }
          const currentActionId = action.actionId || action.timestamp;
          if (currentActionId && currentActionId === lastProcessedActionId) return;
          lastProcessedActionId = currentActionId;

          window.isSimulating = true;
          if (action.seed !== undefined) window.setSeed(action.seed.toString());
          
          if (action.type === 'UNIVERSAL_CLICK') {
              const element = document.querySelector(action.selector);
              if (element) element.click();
          } else if (action.type === 'UPDATE_TRACE') {
              // Custom Canvas Drag Sync Handling
              activeStroke = action.stroke;
              activePoint = action.point;
              if(action.roundComplete) handleRoundComplete(true);
              else drawFrame();
          }

          setTimeout(() => { window.isSimulating = false; }, 50);
      }
  });

  // Function to broadcast live drawing progress
  function sendTraceSync(stroke, point, roundComplete) {
      if (window.isSimulating) return;
      window.parent.postMessage({
          type: 'IFRAME_ACTION_TRIGGERED',
          payload: { type: 'UPDATE_TRACE', stroke, point, roundComplete, actionId: 'trace_' + Date.now() + Math.random(), seed: localSeed }
      }, '*');
  }
</script>

  standing:'Standing Line', sleeping:'Sleeping Line', 'slanting-r':'Slanting Right', 'slanting-l':'Slanting Left',
  zigzag:'Zig Zag', 'curve-up':'Curve Up', 'curve-down':'Curve Down', wave:'Wave', loop:'Loops', himalaya:'Mountains',
  circle:'Circle', square:'Square', triangle:'Triangle', rectangle:'Rectangle', star:'Star', heart:'Heart', diamond:'Diamond', oval:'Oval'
};

/* [SHOOT] - CORE STATE & CANVAS SETUP */
let curCat = 'ABC', curItem = 'A', curRound = 0;
const TOTAL_ROUNDS = 10;

const ctx = canvas.getContext('2d');

// Math & Path State
let parsedStrokes = []; // Array of Arrays of {x,y} points
let activeStroke = 0;
let activePoint = 0;
let isDragging = false;
let pulseTime = 0;
let lastTraceSync = 0; // Throttle for custom sync

// Colors
const COLORS = { ABC:'#3b82f6', abc:'#22c55e', '123':'#f97316', Lines:'#ec4899', Shapes:'#a855f7' };

/* [SKIN] - PROCEDURAL PATH GENERATION (The Engine) 
   Officer Focus: This turns the strings above into dense mathematical coordinates.
*/
function parseDataString(str, w, h) {
  const strokes = str.split('|').map(s => s.trim());
  const size = Math.min(w, h) * 0.8;
  const offX = (w - size) / 2, offY = (h - size) / 2;
  
  const mapPt = (val) => (val / 100) * size;
  let finalStrokes = [];

  strokes.forEach(strokeData => {
    const parts = strokeData.split(' ');
    let pts = [];
    let curX = 0, curY = 0;
    
    for(let i=0; i<parts.length; i++) {
      let cmd = parts[i];
      if (cmd === 'M' || cmd === 'L') {
        curX = mapPt(parseFloat(parts[++i])) + offX;
        curY = mapPt(parseFloat(parts[++i])) + offY;
        pts.push({x: curX, y: curY});
      } 
      else if (cmd === 'Q') {
        const cx = mapPt(parseFloat(parts[++i])) + offX;
        const cy = mapPt(parseFloat(parts[++i])) + offY;
        const ex = mapPt(parseFloat(parts[++i])) + offX;
        const ey = mapPt(parseFloat(parts[++i])) + offY;
        // Interpolate Quadratic Curve (High Density for "Bead" effect)
        const steps = 30; 
        for(let t=1; t<=steps; t++) {
          const nv = t/steps;
          const inv = 1 - nv;
          const x = inv*inv*curX + 2*inv*nv*cx + nv*nv*ex;
          const y = inv*inv*curY + 2*inv*nv*cy + nv*nv*ey;
          pts.push({x, y});
        }
        curX = ex; curY = ey;
      }
    }
    
    // Line Interpolation (Fill gaps so we have a continuous wire of points)
    let densePoints = [];
    for(let i=0; i<pts.length-1; i++) {
      const p1 = pts[i], p2 = pts[i+1];
      const dist = Math.hypot(p2.x-p1.x, p2.y-p1.y);
      const steps = Math.max(2, Math.floor(dist / 4)); // Point every 4 pixels
      for(let t=0; t<steps; t++) {
        densePoints.push({
          x: p1.x + (p2.x - p1.x) * (t/steps),
          y: p1.y + (p2.y - p1.y) * (t/steps)
        });
      }
    }
    densePoints.push(pts[pts.length-1]);
    finalStrokes.push(densePoints);
  });
  
  return finalStrokes;
}

function resize() {
  if (wrap.clientWidth === 0) return;
  canvas.width = wrap.clientWidth;
  canvas.height = wrap.clientHeight;
  initPath();
}
new ResizeObserver(resize).observe(wrap);

function initPath() {
  const data = DICT[curItem] || DICT['A']; // Fallback
  parsedStrokes = parseDataString(data, canvas.width, canvas.height);
  activeStroke = 0;
  activePoint = 0;
  isDragging = false;
  drawFrame();
}

/* ═══════════════════════════════════════════
   UI & NAVIGATION
═══════════════════════════════════════════ */
function setCategory(cat) {
  curCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('cat-' + cat).classList.add('active');
  buildStrip();
  selectItem(CATEGORIES[cat][0]);
}

function buildStrip() {
  const strip = document.getElementById('item-strip');
  strip.innerHTML = '';
  CATEGORIES[curCat].forEach((item, index) => {
    const b = document.createElement('button');
    b.id = 'item-btn-' + index; // Mandatory Rule 3: Unique Static ID
    b.className = 'item-btn';
    b.innerHTML = `<span style="pointer-events:none">${LABELS[item] ? LABELS[item].split(' ')[0] : item}</span>`;
    b.onclick = () => selectItem(item);
    strip.appendChild(b);
  });
}

function selectItem(item) {
  curItem = item;
  curRound = 0;
  document.querySelectorAll('.item-btn').forEach((b, i) => {
    b.classList.toggle('active', CATEGORIES[curCat][i] === item);
    if(CATEGORIES[curCat][i] === item) b.scrollIntoView({behavior:'smooth', inline:'center', block:'nearest'});
  });
  updateHeader();
  initPath();
  playAudio();
}

function updateHeader() {
  document.getElementById('round-label').textContent = `Round ${curRound + 1} of ${TOTAL_ROUNDS}`;
  document.getElementById('guide-label').textContent = LABELS[curItem] || `Letter "${curItem}"`;
  
  const dots = document.getElementById('dots');
  dots.innerHTML = '';
  for(let i=0; i<TOTAL_ROUNDS; i++) {
    const d = document.createElement('div');
    d.className = 'dot' + (i < curRound ? ' done' : i === curRound ? ' current' : '');
    dots.appendChild(d);
  }
}

/* ═══════════════════════════════════════════
   RENDERING ENGINE
═══════════════════════════════════════════ */
function drawFrame(time = 0) {
  if(!parsedStrokes.length || canvas.width === 0) return;
  pulseTime = time * 0.005; // For animation
  
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const color = COLORS[curCat];
  const lw = Math.min(canvas.width, canvas.height) * 0.045; // Line thickness

  // 1. Draw Base Path (Gray Outline)
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  parsedStrokes.forEach(stroke => {
    ctx.beginPath();
    ctx.strokeStyle = '#e5e7eb';
    ctx.lineWidth = lw;
    ctx.moveTo(stroke[0].x, stroke[0].y);
    stroke.forEach(p => ctx.lineTo(p.x, p.y));
    ctx.stroke();
    // Inner dash for guide look
    ctx.beginPath();
    ctx.strokeStyle = '#9ca3af';
    ctx.lineWidth = 2;
    ctx.setLineDash([8, 8]);
    ctx.moveTo(stroke[0].x, stroke[0].y);
    stroke.forEach(p => ctx.lineTo(p.x, p.y));
    ctx.stroke();
    ctx.setLineDash([]);
  });

  // 2. Draw Completed Strokes
  ctx.strokeStyle = color;
  ctx.lineWidth = lw * 0.9;
  for(let i=0; i<activeStroke; i++) {
    ctx.beginPath();
    ctx.moveTo(parsedStrokes[i][0].x, parsedStrokes[i][0].y);
    parsedStrokes[i].forEach(p => ctx.lineTo(p.x, p.y));
    ctx.stroke();
  }

  // 3. Draw Current Active Stroke Progress
  if(activeStroke < parsedStrokes.length) {
    const cStroke = parsedStrokes[activeStroke];
    if(activePoint > 0) {
      ctx.beginPath();
      ctx.moveTo(cStroke[0].x, cStroke[0].y);
      for(let i=1; i<=activePoint; i++) ctx.lineTo(cStroke[i].x, cStroke[i].y);
      ctx.stroke();
    }

    // 4. Draw Start Dot (Green)
    if(activePoint === 0 && !isDragging) {
      ctx.fillStyle = '#22c55e';
      ctx.beginPath();
      ctx.arc(cStroke[0].x, cStroke[0].y, lw * 0.8, 0, Math.PI*2);
      ctx.fill();
    }

    // 5. Draw Arrow Bead
    drawArrow(cStroke, activePoint, lw);
  }

  if(!isDragging && activeStroke < parsedStrokes.length) {
    requestAnimationFrame(drawFrame); // Keep animating pulse if idle
  }
}

function drawArrow(stroke, pIndex, size) {
  const pt = stroke[pIndex];
  // Look ahead a few points to get a smooth direction angle
  const nextPt = stroke[Math.min(pIndex + 5, stroke.length - 1)]; 
  let angle = Math.atan2(nextPt.y - pt.y, nextPt.x - pt.x);
  
  if(pIndex === stroke.length - 1) angle = 0; // Pointing flat at end

  const s = isDragging ? 1 : 1 + Math.sin(pulseTime)*0.15; // Pulse effect

  ctx.save();
  ctx.translate(pt.x, pt.y);
  ctx.rotate(angle);
  ctx.scale(s, s);

  // Draw Blue Triangle/Arrow
  ctx.fillStyle = '#2563eb';
  ctx.shadowColor = 'rgba(0,0,0,0.3)';
  ctx.shadowBlur = 8;
  ctx.shadowOffsetY = 4;
  
  ctx.beginPath();
  const arrSz = size * 0.8;
  ctx.moveTo(arrSz, 0); // Tip
  ctx.lineTo(-arrSz, arrSz*0.8); // Bottom wings
  ctx.lineTo(-arrSz*0.4, 0); // Inner cut
  ctx.lineTo(-arrSz, -arrSz*0.8); // Top wing
  ctx.closePath();
  ctx.fill();

  ctx.restore();
}

/* ═══════════════════════════════════════════
   INTERACTION & SYNC LOGIC
═══════════════════════════════════════════ */
function getPt(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const src = e.touches ? e.touches[0] : e;
  return {x: (src.clientX - rect.left)*scaleX, y: (src.clientY - rect.top)*scaleY};
}

function handleDrag(pos) {
  if(activeStroke >= parsedStrokes.length) return;
  const stroke = parsedStrokes[activeStroke];
  
  // Logic: Search ahead of current point. If finger is near a future point, snap to it.
  const lookAhead = 40; // How many points ahead we check (determines speed)
  const snapRadius = Math.min(canvas.width, canvas.height) * 0.15; // Hitbox size
  
  let maxAdv = activePoint;
  
  for(let i = activePoint; i < Math.min(activePoint + lookAhead, stroke.length); i++) {
    const dist = Math.hypot(stroke[i].x - pos.x, stroke[i].y - pos.y);
    if(dist < snapRadius) {
      maxAdv = i;
    }
  }

  if(maxAdv > activePoint) {
    activePoint = maxAdv;
    
    let roundComplete = false;
    if(activePoint === stroke.length - 1) {
      activeStroke++;
      activePoint = 0;
      isDragging = false; 
      if(activeStroke >= parsedStrokes.length) roundComplete = true;
    }
    
    drawFrame();
    
    // CUSTOM SYNC: Broadcast the drag progress so the other screen renders it beautifully
    const now = Date.now();
    if (now - lastTraceSync > 40 || roundComplete) {
        lastTraceSync = now;
        sendTraceSync(activeStroke, activePoint, roundComplete);
    }

    if (roundComplete) {
        handleRoundComplete(false); // Call locally
    }
  }
}

// 🛑 Prevent touch scroll to stop mobile freezing
canvas.addEventListener('pointerdown', e => {
  if(window.isSimulating) return;
  e.preventDefault();
  isDragging = true;
  handleDrag(getPt(e));
  drawFrame(); 
});

canvas.addEventListener('pointermove', e => {
  if(!isDragging || window.isSimulating) return;
  e.preventDefault();
  handleDrag(getPt(e));
});

canvas.addEventListener('pointerup', e => {
  e.preventDefault();
  isDragging = false;
  requestAnimationFrame(drawFrame); 
});

/* ═══════════════════════════════════════════
   PROGRESSION & EFFECTS
═══════════════════════════════════════════ */
function handleRoundComplete(fromSync = false) {
  drawFrame(); 
  if(curRound < TOTAL_ROUNDS - 1) {
    showStar(false);
    curRound++;
    updateHeader();
    setTimeout(initPath, 800);
  } else {
    showStar(true);
    setTimeout(() => {
      const arr = CATEGORIES[curCat];
      const idx = arr.indexOf(curItem);
      if(idx < arr.length - 1) {
        selectItem(arr[idx + 1]);
      } else {
        showToast("Awesome! Category Completed! 🎉");
        curRound = 0; updateHeader(); initPath();
      }
    }, 1200);
  }
}

function forceNext() {
  if(curRound < TOTAL_ROUNDS - 1) { curRound++; updateHeader(); initPath(); }
  else {
    const arr = CATEGORIES[curCat];
    const idx = arr.indexOf(curItem);
    if(idx < arr.length-1) selectItem(arr[idx+1]);
  }
}

function resetRound() {
  activeStroke = 0; activePoint = 0; drawFrame();
}

function showStar(isTrophy) {
  const el = document.getElementById('star-pop');
  el.querySelector('span').textContent = isTrophy ? '🏆' : '⭐';
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 900);
}

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => el.classList.remove('show'), 3000);
}

/* ═══════════════════════════════════════════
   AUDIO
═══════════════════════════════════════════ */
function playAudio() {
  if (!window.speechSynthesis) return;
  speechSynthesis.cancel();
  let text = LABELS[curItem] || curItem;
  if(curCat === 'ABC') text = `Capital letter ${text}`;
  if(curCat === 'abc') text = `Small letter ${text}`;
  if(curCat === '123') text = `Number ${text}`;
  
  const utt = new SpeechSynthesisUtterance(text);
  utt.rate = 0.85; utt.pitch = 1.1;
  const voices = speechSynthesis.getVoices();
  const pref = voices.find(v => v.lang.startsWith('en') && /female|girl|zira/i.test(v.name));
  if(pref) utt.voice = pref;
  speechSynthesis.speak(utt);
}
speechSynthesis.onvoiceschanged = () => {};

// Safari audio initialization hack
window.addEventListener('click', () => { if(window.speechSynthesis) window.speechSynthesis.getVoices(); }, {once: true});

/* INIT */
window.onload = () => {
  setCategory('ABC');
  setTimeout(resize, 100);
};
</script>
