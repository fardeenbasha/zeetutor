<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Missing Numbers!</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<!-- ============================================================
     PART 1 — UNIVERSAL SYNC BRIDGE (NEVER EDIT)
     ============================================================ -->
<script>
    window.isSimulating = false;
    const urlParams = new URLSearchParams(window.location.search || window.location.hash.replace('#', '?'));
    const roomId = urlParams.get('room') || '54321';
    let localSeed = 0;
    
    window.setSeed = function(str) {
        let tempSeed = 0;
        for (let i = 0; i < str.length; i++) { tempSeed = str.charCodeAt(i) + ((tempSeed << 5) - tempSeed); }
        localSeed = Math.abs(tempSeed);
    };
    window.setSeed(roomId);
    
    window.seededRandom = function() {
        let x = Math.sin(localSeed++) * 10000;
        return x - Math.floor(x);
    };

    function getUniqueSelector(el) {
        if (!el) return null;
        if (el.id) return '#' + el.id;
        if (el === document.body) return 'body';
        let path = [];
        while (el && el.nodeType === Node.ELEMENT_NODE) {
            let selector = el.nodeName.toLowerCase();
            if (el.id) { selector = '#' + el.id; path.unshift(selector); break; } 
            else {
                if (el.className && typeof el.className === 'string') {
                    const classes = Array.from(el.classList).filter(c => !c.includes(':') && !c.includes('[') && !c.includes('/')).join('.');
                    if (classes) selector += '.' + classes;
                }
                let sibling = el, nth = 1;
                while (sibling = sibling.previousElementSibling) { if (sibling.nodeName.toLowerCase() === el.nodeName.toLowerCase()) nth++; }
                selector += ':nth-of-type(' + nth + ')';
                path.unshift(selector);
            }
            el = el.parentNode;
        }
        return path.join(' > ');
    }

    let actionIdCounter = 0;
    document.addEventListener('click', (e) => {
        if (e.isTrusted === false || window.isSimulating) return;
        const selector = getUniqueSelector(e.target); if (!selector) return;
        actionIdCounter++;
        window.parent.postMessage({
            type: 'IFRAME_ACTION_TRIGGERED',
            payload: { type: 'UNIVERSAL_CLICK', selector: selector, seed: localSeed, actionId: 'click_' + actionIdCounter + '_' + Date.now() }
        }, '*');
    }, true);

    let lastCursorTime = 0;
    document.addEventListener('mousemove', (e) => {
        const now = Date.now(); if (now - lastCursorTime < 40) return; lastCursorTime = now;
        window.parent.postMessage({ type: 'IFRAME_ACTION_TRIGGERED', payload: { type: 'UNIVERSAL_CURSOR', pctX: (e.clientX / window.innerWidth) * 100, pctY: (e.clientY / window.innerHeight) * 100 } }, '*');
    });

    document.addEventListener('touchmove', (e) => {
        if (e.touches.length > 0) {
            const now = Date.now(); if (now - lastCursorTime < 40) return; lastCursorTime = now;
            window.parent.postMessage({ type: 'IFRAME_ACTION_TRIGGERED', payload: { type: 'UNIVERSAL_CURSOR', pctX: (e.touches[0].clientX / window.innerWidth) * 100, pctY: (e.touches[0].clientY / window.innerHeight) * 100 } }, '*');
        }
    }, { passive: true });

    let lastProcessedActionId = null;
    window.addEventListener('message', (event) => {
        if (event.data && event.data.type === 'EXECUTE_UNIVERSAL_ACTION') {
            const action = event.data.action;
            if (action.type === 'UNIVERSAL_CURSOR') {
                const c = document.getElementById('remote-cursor');
                if (c) {
                    c.style.left = (action.pctX / 100 * window.innerWidth) + 'px';
                    c.style.top = (action.pctY / 100 * window.innerHeight) + 'px';
                    c.style.display = 'block';
                }
                return;
            }
            const currentActionId = action.actionId || action.timestamp;
            if (currentActionId && currentActionId === lastProcessedActionId) return;
            lastProcessedActionId = currentActionId;

            window.isSimulating = true;
            if (action.seed !== undefined) localSeed = action.seed;
            
            if (action.type === 'UNIVERSAL_CLICK') {
                const element = document.querySelector(action.selector);
                if (element) element.click();
            }
            setTimeout(() => { window.isSimulating = false; }, 50);
        }
    });
</script>

<!-- ============================================================
     PART 2 — STYLES & LAYOUT SIZING
     ============================================================ -->
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
    font-family: 'Nunito', sans-serif;
    width: 100vw; 
    height: 100vh; 
    overflow: hidden; 
    display: flex; 
    justify-content: center; 
    align-items: center; 
    background-color: #0f172a; 
    user-select: none;
    -webkit-user-drag: none;
}

/* 🎯 THE GOLDEN APP WRAPPER (Fits perfectly on Laptop and Phone views) */
#app-wrapper {
    width: 95vw; 
    max-width: 900px; 
    height: 95vh; 
    max-height: 720px; 
    position: relative; 
    display: flex; 
    flex-direction: column;
    overflow: hidden; 
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    border-radius: 24px;
    border: 4px solid white;
    transition: background 0.5s;
}

/* Pointer Events Protection */
button *, .flag-shape *, .hex-shape *, .wavy-wrap *, .ship-wrap *, .bank-chip *, .c-btn * {
    pointer-events: none;
}

/* THEME BACKGROUNDS */
#app-wrapper.kite-theme{background:linear-gradient(180deg,#87CEEB 0%,#b8e4f9 50%,#e0f4fe 100%);}
#app-wrapper.bee-theme{background:linear-gradient(180deg,#fffde7 0%,#fff8c5 50%,#fef3c7 100%);}
#app-wrapper.lighthouse-theme{background:linear-gradient(180deg,#e8f4f8 0%,#cce8f4 40%,#a8d8ea 100%);}
#app-wrapper.space-theme{background:linear-gradient(180deg,#0a0a2e 0%,#111144 50%,#1a1a5e 100%);}

/* HEADER */
.top-bar { display:flex;align-items:center;justify-content:space-between; padding:12px 18px;position:relative;z-index:10; }
.game-title { font-family:'Fredoka One',cursive;font-size: clamp(1.4rem, 4vw, 1.8rem); text-shadow:2px 2px 0 rgba(0,0,0,0.15); }
#app-wrapper.kite-theme .game-title{color:#e53935;}
#app-wrapper.bee-theme .game-title{color:#f57f17;}
#app-wrapper.lighthouse-theme .game-title{color:#0277bd;}
#app-wrapper.space-theme .game-title{color:#c77dff;text-shadow:0 0 20px #c77dff88;}

.sound-btn {
  width:42px;height:42px;border-radius:50%;border:2px solid rgba(255,255,255,0.7);
  background:rgba(255,255,255,0.3);font-size:1.3rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all 0.2s;
}
.sound-btn:active{transform:scale(0.9);}

/* SELECTOR ROW */
.selector-row { display:flex;flex-wrap:wrap;gap:8px;justify-content:center; padding:6px 12px 10px;position:relative;z-index:10; }
.sel-btn {
  padding:8px 16px;border-radius:30px;border:2px solid transparent;
  font-family:'Fredoka One',cursive;font-size: clamp(0.75rem, 2vw, 0.9rem);cursor:pointer;
  transition:all 0.1s;color:#fff;box-shadow:0 3px 8px rgba(0,0,0,0.2);
}
.sel-btn:active{transform:scale(0.95);}
.theme-sel{padding:6px 12px;}
#app-wrapper.kite-theme .range-sel{background:#ef5350;}
#app-wrapper.bee-theme .range-sel{background:#f9a825;}
#app-wrapper.lighthouse-theme .range-sel{background:#0288d1;}
#app-wrapper.space-theme .range-sel{background:#7b2ff7;}
.range-sel.active{border-color:#fff;transform:scale(1.08);box-shadow:0 0 0 3px rgba(255,255,255,0.4),0 4px 12px rgba(0,0,0,0.3);}

.kite-sel{background:linear-gradient(135deg,#ff7043,#e53935);}
.bee-sel{background:linear-gradient(135deg,#ffd54f,#f9a825);}
.lh-sel{background:linear-gradient(135deg,#4fc3f7,#0288d1);}
.sp-sel{background:linear-gradient(135deg,#ce93d8,#7b2ff7);}
.custom-sel{background:linear-gradient(135deg,#7b2ff7,#c77dff); font-weight: bold;}
.theme-sel.active{border-color:#ffd93d;transform:scale(1.08);box-shadow:0 0 0 3px rgba(255,217,61,0.4);}

/* 🛡️ FIXED HEIGHT INDEPENDENT SCROLL PLAY AREA */
.game-canvas { 
    position:relative;
    flex:1; 
    width:100%; 
    max-width:800px; 
    margin:0 auto; 
    padding:10px 12px 25px;
    overflow-y: auto; 
    overflow-x: hidden;
}

/* KITE THEME */
.kite-deco{position:absolute;top:0;left:0;pointer-events:none;opacity:0.9;z-index:1;}
.cloud{position:absolute;pointer-events:none;}
.bunting-row{display:flex;justify-content:center;flex-wrap:wrap;gap:4px;margin:8px 0;position:relative;z-index:5;}
.bunting-rope{ position:absolute;top:20px;left:20px;right:20px;height:2px; background:rgba(100,70,30,0.5);border-radius:2px;z-index:0; }
.flag-wrap{display:flex;flex-direction:column;align-items:center;position:relative;z-index:2;}
.flag-shape{ width:58px;height:68px; clip-path:polygon(0 0,100% 0,50% 100%); display:flex;align-items:40%;justify-content:center; cursor:pointer;transition:transform 0.1s,filter 0.2s; position:relative; }
.flag-shape .flag-num{ font-family:'Fredoka One',cursive;font-size:1.5rem;color:#fff; text-shadow:1px 2px 3px rgba(0,0,0,0.3); margin-top:8px; pointer-events: none;}
.flag-shape.blank-flag{ background:rgba(255,255,255,0.5)!important; border:2px dashed rgba(100,100,100,0.4); }
.flag-shape.blank-flag .flag-num{color:rgba(0,0,0,0.25);}
.flag-shape:active{transform:scale(0.95);}
.flag-shape.correct{animation:flagPop 0.4s ease;}
@keyframes flagPop{0%{transform:scale(1);}50%{transform:scale(1.2) rotate(5deg);}100%{transform:scale(1) rotate(0);}}
.flag-shape.wrong{animation:flagShake 0.35s ease;}
@keyframes flagShake{0%,100%{transform:translateX(0);}25%{transform:translateX(-6px);}75%{transform:translateX(6px);}}

/* BEE HONEYCOMB */
.honeycomb-grid{ display:flex;flex-direction:column;align-items:center;gap:0; position:relative;z-index:5;padding-top:10px; }
.hex-row{display:flex;margin:-10px 0;}
.hex-row:nth-child(even){margin-left:44px;}
.hex-wrap{width:80px;height:92px;position:relative;margin:2px;}
.hex-shape{ width:76px;height:88px; clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%); display:flex;align-items:center;justify-content:center; cursor:pointer;transition:transform 0.1s,filter 0.2s; font-family:'Fredoka One',cursive;font-size:1.6rem;color:#fff; text-shadow:1px 2px 3px rgba(0,0,0,0.25); }
.hex-shape.blank-hex{ background:rgba(255,255,255,0.4)!important; outline:3px dashed rgba(200,150,0,0.5); color:rgba(0,0,0,0.2); }
.hex-shape:active{transform:scale(0.95);}
.hex-shape.correct{animation:hexPop 0.4s ease;}
@keyframes hexPop{0%{transform:scale(1);}50%{transform:scale(1.25);}100%{transform:scale(1);}}
.hex-shape.wrong{animation:hexShake 0.35s;}
@keyframes hexShake{0%,100%{transform:none;}30%{transform:translateX(-5px);}70%{transform:translateX(5px);}}

/* LIGHTHOUSE THEME */
.wavy-grid{ display:flex;flex-wrap:wrap;justify-content:center;gap:12px; position:relative;z-index:5;padding-top:20px; }
.wavy-wrap{position:relative;width:82px;height:82px;cursor:pointer;}
.wavy-svg{position:absolute;inset:0;width:100%;height:100%;pointer-events: none;}
.wavy-num{ position:absolute;inset:0;display:flex;align-items:center;justify-content:center; font-family:'Fredoka One',cursive;font-size:1.6rem;color:#333; transition:all 0.2s; pointer-events: none;}
.wavy-wrap.blank-wavy .wavy-num{color:rgba(0,0,0,0.18) !important;}
.wavy-wrap:active{transform:scale(0.95);}
.wavy-wrap.correct{animation:wavyPop 0.4s ease;}
@keyframes wavyPop{0%{transform:scale(1);}50%{transform:scale(1.2);}100%{transform:scale(1);}}
.wavy-wrap.wrong{animation:wavyShake 0.35s;}
@keyframes wavyShake{0%,100%{transform:none;}30%{transform:translateX(-5px);}70%{transform:translateX(5px);}}

/* SPACE THEME */
.ships-grid{ display:grid;grid-template-columns:repeat(auto-fit,minmax(80px,1fr));gap:14px; position:relative;z-index:5;padding-top:10px; }
.ship-wrap{ display:flex;flex-direction:column;align-items:center;cursor:pointer; transition:transform 0.1s; }
.ship-wrap:active{transform:scale(0.95);}
.ship-body{position:relative;width:80px;height:65px;pointer-events: none;}
.ship-body svg{width:100%;height:100%;pointer-events: none;}
.ship-num{ position:absolute;top:14px;left:50%;transform:translateX(-50%); font-family:'Fredoka One',cursive;font-size:1.4rem;color:#fff; text-shadow:0 0 8px rgba(100,200,255,0.8),1px 1px 2px rgba(0,0,0,0.5); pointer-events: none;}
.ship-wrap.blank-ship .ship-num{color:rgba(255,255,255,0.2) !important;}
.ship-wrap.correct{animation:shipPop 0.4s ease;}
@keyframes shipPop{0%{transform:translateY(0);}40%{transform:translateY(-12px);}100%{transform:translateY(0);}}
.ship-wrap.wrong{animation:shipShake 0.35s;}
@keyframes shipShake{0%,100%{transform:none;}30%{transform:translateX(-6px);}70%{transform:translateX(6px);}}
.star-bg{position:absolute;border-radius:50%;background:#fff;animation:twinkle ease-in-out infinite;}
@keyframes twinkle{0%,100%{opacity:0.3;}50%{opacity:1;}}

/* 🛡️ FIXED BOTTOM NUMBER BANK (Bypasses Scroll) */
.number-bank{
  width: 100%;
  z-index: 50;
  padding: 12px 15px; 
  border-top: 3px solid rgba(255,255,255,0.5);
  backdrop-filter: blur(10px); 
  border-radius: 0 0 20px 20px;
  flex-shrink: 0;
}
#app-wrapper.kite-theme .number-bank{background:rgba(200,235,255,0.92);}
#app-wrapper.bee-theme .number-bank{background:rgba(255,248,180,0.95);}
#app-wrapper.lighthouse-theme .number-bank{background:rgba(200,230,245,0.92);}
#app-wrapper.space-theme .number-bank{background:rgba(10,10,50,0.92);border-top-color:rgba(199,125,255,0.4);}

.bank-label{ text-align:center;font-family:'Fredoka One',cursive; font-size:0.95rem;margin-bottom:6px; }
#app-wrapper.kite-theme .bank-label{color:#c62828;}
#app-wrapper.bee-theme .bank-label{color:#e65100;}
#app-wrapper.lighthouse-theme .bank-label{color:#01579b;}
#app-wrapper.space-theme .bank-label{color:#c77dff;}

.bank-nums{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}
.bank-chip{
  width:clamp(45px, 11vw, 55px); height:clamp(45px, 11vw, 55px); border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  font-family:'Fredoka One',cursive;font-size:1.3rem;color:#fff;
  cursor:pointer;user-select:none;touch-action:manipulation;
  box-shadow:0 4px 10px rgba(0,0,0,0.25),inset 0 1px 0 rgba(255,255,255,0.3);
  transition:transform 0.1s,opacity 0.2s; text-shadow:1px 1px 3px rgba(0,0,0,0.3);
}
.bank-chip:active{transform:scale(0.9);}
.bank-chip.used{opacity:0.15;pointer-events:none;}
.bank-chip.selected{ box-shadow:0 0 0 3px #ffd93d,0 6px 18px rgba(0,0,0,0.35); transform:scale(1.12); }
#app-wrapper.kite-theme .bank-chip{background:linear-gradient(135deg,#ff7043,#e53935);}
#app-wrapper.bee-theme .bank-chip{background:linear-gradient(135deg,#ffca28,#f57f17);color:#333;text-shadow:none;}
#app-wrapper.lighthouse-theme .bank-chip{background:linear-gradient(135deg,#4fc3f7,#0277bd);}
#app-wrapper.space-theme .bank-chip{background:linear-gradient(135deg,#b39ddb,#7b2ff7);}

/* SCORE / PROGRESS */
.score-row{ display:flex;gap:10px;justify-content:center;align-items:center; padding:4px 0 8px;position:relative;z-index:10; }
.spill{
  background:rgba(255,255,255,0.35);backdrop-filter:blur(6px);
  border:1.5px solid rgba(255,255,255,0.6);border-radius:20px;
  padding:4px 14px;font-family:'Fredoka One',cursive; font-size:1rem;
}
#app-wrapper.kite-theme .spill{color:#b71c1c;}
#app-wrapper.bee-theme .spill{color:#e65100;}
#app-wrapper.lighthouse-theme .spill{color:#01579b;}
#app-wrapper.space-theme .spill{color:#e0d7ff;border-color:rgba(199,125,255,0.4);}

.prog-bar{
  height:8px;border-radius:8px;background:rgba(255,255,255,0.3);
  margin:0 16px 6px;max-width:700px;margin-left:auto;margin-right:auto;
  overflow:hidden;border:1px solid rgba(255,255,255,0.4); position:relative;z-index:10;
}
.prog-fill{height:100%;border-radius:8px;transition:width 0.4s ease;width:0%;}
#app-wrapper.kite-theme .prog-fill{background:linear-gradient(90deg,#ff7043,#e53935);}
#app-wrapper.bee-theme .prog-fill{background:linear-gradient(90deg,#ffd54f,#f9a825);}
#app-wrapper.lighthouse-theme .prog-fill{background:linear-gradient(90deg,#4fc3f7,#0277bd);}
#app-wrapper.space-theme .prog-fill{background:linear-gradient(90deg,#c77dff,#4cc9f0);}

/* VICTORY & CUSTOM MODAL */
.victory, .custom-modal {
  display:none;position:absolute;inset:0;z-index:200;
  background:rgba(0,0,0,0.55);backdrop-filter:blur(8px);
  align-items:center;justify-content:center;
  border-radius: 24px;
}
.victory.show{display:flex;}
.v-card, .custom-card{
  background:#fff;border-radius:28px;padding:36px 32px;
  text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.35);
  animation:vPop 0.45s cubic-bezier(0.36,0.07,0.19,0.97);
  position: relative;
}
@keyframes vPop{0%{transform:scale(0.4);}70%{transform:scale(1.06);}100%{transform:scale(1);}}
.v-emoji{font-size:3.5rem;display:block;margin-bottom:6px;}
.v-title{font-family:'Fredoka One',cursive;font-size:2rem;color:#e53935;}
.v-stars{font-size:2rem;margin:8px 0;}
.v-btn{
  margin-top:12px;padding:10px 28px;border:none;border-radius:50px;
  background:linear-gradient(135deg,#ff7043,#e53935);
  font-family:'Fredoka One',cursive;font-size:1.1rem;color:#fff;
  cursor:pointer;box-shadow:0 4px 14px rgba(229,57,53,0.4);
  transition:transform 0.1s;
}
.v-btn:active{transform:translateY(4px); box-shadow: 0 0 0 transparent;}

@keyframes pfly{0%{transform:translate(0,0) scale(1);opacity:1;}100%{transform:translate(var(--tx),var(--ty)) scale(0);opacity:0;}}

/* Custom Modal Extras */
.custom-card { padding: 24px 30px; width: 90%; max-width: 380px; }
.custom-row { display:flex; justify-content:space-between; align-items:center; margin:16px 0; background:#f8fafc; border-radius:16px; padding:12px; border: 2px solid #e2e8f0;}
.c-btn { background:#e2e8f0; border:none; width:40px; height:40px; border-radius:12px; font-family:'Fredoka One',cursive; font-size:1.4rem; color:#475569; cursor:pointer; transition: transform 0.1s; }
.c-btn:active { transform:scale(0.9); }
.c-val { font-family:'Fredoka One',cursive; font-size:1.8rem; color:#0f172a; width:60px; text-align: center; }
.c-play { background:linear-gradient(135deg,#7b2ff7,#c77dff); color:white; font-family:'Fredoka One',cursive; border:none; padding:12px 30px; border-radius:30px; font-size:1.2rem; cursor:pointer; box-shadow:0 6px 15px rgba(123,47,247,0.4); margin-top:10px; transition: transform 0.1s; width: 100%;}
.c-play:active { transform:scale(0.95); }
.c-close { position:absolute; top:12px; right:16px; background:none; border:none; font-size:1.5rem; cursor:pointer; color:#94a3b8; transition: color 0.2s;}
.c-close:active { color:#ef4444; }

/* 🛡️ RESPONSIVE MOBILE SIZING CONSTRAINTS FOR Honeycomb & Wavy layout offsets */
@media (max-width: 600px) {
  #app-wrapper {
    border-radius: 20px;
    border: 4px solid white;
    width: 98vw;
    height: 98vh;
  }
  .honeycomb-grid {
    padding-left: 50px !important;
  }
  .beehive-svg {
    width: 65px !important;
    height: 80px !important;
  }
  .lighthouse-svg {
    width: 55px !important;
    height: 125px !important;
  }
  .wavy-grid {
    padding-left: 45px !important;
    padding-top: 10px !important;
    gap: 8px !important;
  }
  .wavy-wrap {
    width: 68px !important;
    height: 68px !important;
  }
  .wavy-num {
    font-size: 1.3rem !important;
  }
  .flag-shape {
    width: 48px !important;
    height: 56px !important;
  }
  .flag-num {
    font-size: 1.2rem !important;
  }
  .hex-wrap {
    width: 65px !important;
    height: 75px !important;
  }
  .hex-shape {
    width: 61px !important;
    height: 71px !important;
    font-size: 1.2rem !important;
  }
  .hex-row:nth-child(even) {
    margin-left: 32px !important;
  }
}
</style>
</head>
<body>

<!-- RED DOT CURSOR — REQUIRED BY LIVETUTOR CONSOLE -->
<div id="remote-cursor" style="position:fixed; width:18px; height:18px; background:red; border-radius:50%; border:3px solid white; box-shadow:0 0 10px rgba(255,0,0,.6); pointer-events:none; z-index:99999; transform:translate(-50%,-50%); display:none;"></div>

<div id="app-wrapper" class="kite-theme">
    <!-- HEADER -->
    <div class="top-bar">
      <div class="game-title" id="gameTitle">🪁 Missing Numbers!</div>
      <button class="sound-btn" id="sndBtn">🔊</button>
    </div>

    <!-- SELECTORS -->
    <div class="selector-row" id="themeRow">
      <button id="theme-kite" class="sel-btn theme-sel kite-sel active" onclick="setTheme('kite',this)">🪁 Kite</button>

<script>
// ===== BHAGAM 4: SEEDED SHUFFLE =====
function shuf(arr) {
    let a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(window.seededRandom() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
}

// ===== STATE =====
let theme='kite', rStart=1, rEnd=5;
let cFrom=40, cTo=50; 
let blanks=[], filled={}, selNum=null, attempts=0, score=0, soundOn=true;

// ===== AUDIO =====
function ac(){if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function tone(f,t,d,v=0.25,sd=0){if(!soundOn)return;try{const c=ac(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type=t;o.frequency.value=f;const s=c.currentTime+sd;g.gain.setValueAtTime(0,s);g.gain.linearRampToValueAtTime(v,s+0.02);g.gain.exponentialRampToValueAtTime(0.001,s+d);o.start(s);o.stop(s+d+0.05);}catch(e){}}
function sCorrect(){tone(523,'sine',0.12,0.22);tone(659,'sine',0.12,0.22,0.1);tone(784,'sine',0.18,0.22,0.2);}
function sWrong(){tone(220,'sawtooth',0.12,0.12);tone(180,'sawtooth',0.12,0.12,0.1);}
function sPick(){tone(440,'sine',0.07,0.12);}
function sVictory(){[523,659,784,1047,1319].forEach((n,i)=>tone(n,'sine',0.2,0.25,i*0.12));}

function startBgMusic(){
  stopBgMusic();if(!soundOn)return;
  const melodies={kite:[330,392,440,392,330,294,330,392],bee:[294,370,440,370,294,330,392,330],lighthouse:[261,329,392,329,261,293,349,293],space:[196,233,277,233,196,220,261,220]};
  const m=melodies[theme];let i=0;
  bgMusicTimer=setInterval(()=>{tone(m[i%m.length],'sine',0.28,0.06);i++;},550);
}
function stopBgMusic(){if(bgMusicTimer){clearInterval(bgMusicTimer);bgMusicTimer=null;}}

// ===== THEME =====
const TITLES={kite:'🪁 Missing Numbers!',bee:'🐝 Missing Numbers!',lighthouse:'🏠 Missing Numbers!',space:'🚀 Missing Numbers!'};
const BANK_LABELS={kite:'🪁 Tap a number, then tap the flag!',bee:'🐝 Tap a number, then tap the honeycomb!',lighthouse:'⚓ Tap a number, then tap the wave!',space:'🛸 Tap a number, then tap the spaceship!'};

window.setTheme = function(t,btn){
  theme=t;
  document.getElementById('app-wrapper').className=t+'-theme';
  document.getElementById('gameTitle').textContent=TITLES[t];
  document.getElementById('bankLabel').textContent=BANK_LABELS[t];

  roundId++; 
  buildGame();startBgMusic();
}

window.setRange = function(s,e,btn){
  rStart=s;rEnd=e;

}

// ===== CUSTOM RANGE MODAL LOGIC =====
window.openCustomRangeModal = function(btn) {
  document.querySelectorAll('.range-sel').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('customRangeModal').style.display = 'flex';
  updateCustomUI();
  sPick();
}

window.closeCustomModal = function() {
  document.getElementById('customRangeModal').style.display = 'none';
  sPick();
}

window.adjCustom = function(type, d) {
  if(type === 'from') {
      cFrom = Math.max(1, Math.min(99, cFrom + d));
      if (cFrom >= cTo) cTo = cFrom + 1;
      if (cTo - cFrom > 30) cTo = cFrom + 30; 
  } else {
      cTo = Math.max(2, Math.min(100, cTo + d));
      if (cTo <= cFrom) cFrom = cTo - 1;
      if (cTo - cFrom > 30) cFrom = cTo - 30; 
  }
  updateCustomUI();
  sPick();
}

function updateCustomUI() {
  document.getElementById('val-c-from').textContent = cFrom;
  document.getElementById('val-c-to').textContent = cTo;
}

window.playCustomRange = function() {
  document.getElementById('customRangeModal').style.display = 'none';
  sPick();
  setRange(cFrom, cTo, document.getElementById('r-custom'));
}

// ===== KALI THUDANGUKA =====
function pickBlanks(s,e){
  const nums=[];for(let n=s;n<=e;n++)nums.push(n);
  const sh=shuf(nums); 
  const cnt=Math.max(2,Math.round(nums.length*0.5));
  return sh.slice(0,cnt).sort((a,b)=>a-b);
}

function buildGame(){
  window.setSeed(roomId + "_round_" + roundId); 
  filled={};selNum=null;attempts=0;score=0;
  document.getElementById('scoreV').textContent=0;
  document.getElementById('tryV').textContent=0;

  document.getElementById('starsV').textContent='☆☆☆';
  blanks=pickBlanks(rStart,rEnd);
  const c=document.getElementById('gameCanvas');c.innerHTML='';
  if(theme==='kite') buildKite(c);
  else if(theme==='bee') buildBee(c);
  else if(theme==='lighthouse') buildLighthouse(c);
  else buildSpace(c);
  buildBank();
}

function wavyPath(cx,cy,r,points){
  let d='';const amp=5;
  for(let i=0;i<=points*2;i++){
    const a=(i/points*2)*Math.PI;
    const rr=i%2===0?r+amp:r-amp;
    const x=cx+rr*Math.cos(a-Math.PI/2);
    const y=cy+rr*Math.sin(a-Math.PI/2);
    d+=(i===0?'M':'L')+x.toFixed(1)+','+y.toFixed(1);
  }
  return d+'Z';
}

        <ellipse cx="40" cy="52" rx="22" ry="5" fill="${isBlank?'rgba(100,100,200,0.1)':color+'44'}"/>
        <circle cx="27" cy="50" r="3" fill="${isBlank?'rgba(200,200,255,0.2)':'rgba(100,255,200,0.8)'}"/>
        <circle cx="40" cy="52" r="3" fill="${isBlank?'rgba(200,200,255,0.2)':'rgba(100,200,255,0.8)'}"/>
        <circle cx="53" cy="50" r="3" fill="${isBlank?'rgba(200,200,255,0.2)':'rgba(200,100,255,0.8)'}"/>
      </svg>
      <div class="ship-num">${isBlank?'?':n}</div>
    </div>`;

    if(isBlank){
      sw.addEventListener('click',()=>handleSlotClick(n));
    }
    sg.appendChild(sw);
  });
  c.appendChild(sg);
}

function adjustC(hex,amt){
  try{
    const r=Math.max(0,Math.min(255,parseInt(hex.slice(1,3),16)+amt));
    const g=Math.max(0,Math.min(255,parseInt(hex.slice(3,5),16)+amt));
    const b=Math.max(0,Math.min(255,parseInt(hex.slice(5,7),16)+amt));
    return '#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');
  }catch(e){return hex;}
}

// ===== BANK =====
function buildBank(){
  const bn=document.getElementById('bankNums');bn.innerHTML='';
  const sh=shuf([...blanks]); 
  sh.forEach(n=>{
    const ch=document.createElement('div');
    ch.id = 'bank-chip-' + n; 
    ch.className='bank-chip';ch.dataset.value=n;ch.textContent=n;
    ch.addEventListener('click',()=>handleBankClick(n,ch));
    bn.appendChild(ch);
  });
}

// ===== TAP LOGIC (SYNC SAFE) =====
window.handleBankClick = function(n,el){
  if(selNum===n){el.classList.remove('selected');selNum=null;return;}
  document.querySelectorAll('.bank-chip').forEach(c=>c.classList.remove('selected'));
  el.classList.add('selected');selNum=n;sPick();
}

window.handleSlotClick = function(targetVal){
  if(selNum===null) return;
  checkAns(selNum,targetVal);
  document.querySelectorAll('.bank-chip').forEach(c=>c.classList.remove('selected'));
  selNum=null;
}

// ===== CHECK =====
function checkAns(placed, target){
  attempts++;document.getElementById('tryV').textContent=attempts;
  if(placed!==target){
    const el=document.querySelector(`[data-value="${target}"]`);
    if(el){el.classList.add('wrong');setTimeout(()=>el.classList.remove('wrong'),400);}
    sWrong();return;
  }
  filled[target]=true;
  const el=document.querySelector(`[data-value="${target}"]`);
  const bankEl=document.querySelector(`.bank-chip[data-value="${placed}"]`);
  if(bankEl) bankEl.classList.add('used');

  if(el){
    if(theme==='kite'){
      el.classList.remove('blank-flag');el.classList.add('correct');
      el.style.background=FLAG_COLORS[(target-1)%FLAG_COLORS.length];
      el.querySelector('.flag-num').textContent=target;
    } else if(theme==='bee'){
      el.classList.remove('blank-hex');el.classList.add('correct');
      el.style.background=HEX_COLORS[(target-1)%HEX_COLORS.length];
      el.textContent=target;
    } else if(theme==='lighthouse'){
      el.classList.remove('blank-wavy');el.classList.add('correct');
      const color=WAVY_COLORS[(target-1)%WAVY_COLORS.length];
      el.querySelector('path').style.fill=color;el.querySelector('path').style.stroke=adjustC(color,-20);
      el.querySelector('.wavy-num').textContent=target;
    } else {
      el.classList.remove('blank-ship');el.classList.add('correct');
      const color=SHIP_COLORS[(target-1)%SHIP_COLORS.length];
      el.querySelector('ellipse').setAttribute('fill',color);
      el.querySelector('.ship-num').textContent=target;
      el.querySelector('.ship-num').style.color='#fff';
    }
  }

  score++;document.getElementById('scoreV').textContent=score;
  sCorrect();updateProg();updateStars();
  spawnParticles(el);
  if(Object.keys(filled).length===blanks.length) setTimeout(showVictory,700);
}

function spawnParticles(el){
  if(!el)return;
  const r=el.getBoundingClientRect();
  const cx=r.left+r.width/2,cy=r.top+r.height/2;
  ['⭐','✨','💫','🌟'].forEach(e=>{
    const p=document.createElement('div');
    p.textContent=e;p.style.cssText=`position:fixed;left:${cx}px;top:${cy}px;font-size:1.1rem;pointer-events:none;z-index:60;
    animation:pfly 0.7s ease-out forwards;--tx:${(Math.random()-0.5)*80}px;--ty:${-(20+Math.random()*70)}px;`;
    document.body.appendChild(p);setTimeout(()=>p.remove(),800);
  });
}

function updateProg(){
  const pct=(Object.keys(filled).length/blanks.length)*100;
  document.getElementById('progFill').style.width=pct+'%';
}

function updateStars(){
  const d=Object.keys(filled).length/blanks.length;
  document.getElementById('starsV').textContent=d>=1?'⭐⭐⭐':d>=0.6?'⭐⭐☆':d>=0.3?'⭐☆☆':'☆☆☆';
}

// ===== VICTORY =====
function showVictory(){
  sVictory();confetti();
  const err=attempts-blanks.length;
  document.getElementById('vEmoji').textContent=err===0?'🏆':err<=2?'🎉':'🌟';
  document.getElementById('vStars').textContent=err===0?'⭐⭐⭐':err<=2?'⭐⭐⭐':err<=4?'⭐⭐☆':'⭐☆☆';
  document.getElementById('vMsg').textContent=err===0?'Perfect! Zero mistakes!':'All missing numbers found!';
  document.getElementById('vic').classList.add('show');
}
function confetti(){
  const cls=['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#c77dff','#ff9f43'];
  for(let i=0;i<50;i++){
    const p=document.createElement('div');p.className='cpiece';
    const w=5+Math.random()*8,h=8+Math.random()*12;
    p.style.cssText=`width:${w}px;height:${h}px;background:${cls[Math.floor(Math.random()*cls.length)]};
    left:${Math.random()*100}vw;animation-duration:${2+Math.random()*2}s;animation-delay:${Math.random()*0.4}s;
    border-radius:${Math.random()>.5?'50%':'2px'};`;
    document.body.appendChild(p);setTimeout(()=>p.remove(),4500);
  }
}
window.playAgain = function(){
    document.getElementById('vic').classList.remove('show');
    roundId++; 
    buildGame();
}

// ===== SOUND TOGGLE =====
document.getElementById('sndBtn').addEventListener('click',()=>{
  soundOn=!soundOn;document.getElementById('sndBtn').textContent=soundOn?'🔊':'🔇';
  if(soundOn)startBgMusic();else stopBgMusic();
});

// ===== INIT =====
document.addEventListener('click', () => ac(), { once: true });
buildGame();setTimeout(startBgMusic,600);
</script>
