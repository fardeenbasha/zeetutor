<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Count Numbers Game</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<!-- ============================================================
     PART 1 — SYNC BLOCK (RELATIVE WRAPPER SYNC - NO SCROLL DESYNC)
     ============================================================ -->
<script>
  window.isSimulating = false;
  const urlParams = new URLSearchParams(
    window.location.search || window.location.hash.replace('#','?')
  );
  const roomId = urlParams.get('room') || '54321';
  let localSeed = 0;
  for (let i = 0; i < roomId.length; i++) {
    localSeed = roomId.charCodeAt(i) + ((localSeed << 5) - localSeed);
  }
  localSeed = Math.abs(localSeed);
  window.seededRandom = function() {
    let x = Math.sin(localSeed++) * 10000;
    return x - Math.floor(x);
  };
  function getUniqueSelector(el) {
    if (!el) return null;
    if (el.id) return '#' + el.id;
    if (el === document.body) return 'body';
    let path = [];
    while (el && el.nodeType === Node.ELEMENT_NODE) {
      let sel = el.nodeName.toLowerCase();
      if (el.id) { sel = '#' + el.id; path.unshift(sel); break; }
      else {
        if (el.className && typeof el.className === 'string') {
          const cls = Array.from(el.classList)
            .filter(c => !c.includes(':') && !c.includes('[') && !c.includes('/'))
            .join('.');
          if (cls) sel += '.' + cls;
        }
        let sib = el, nth = 1;
        while (sib = sib.previousElementSibling)
          if (sib.nodeName.toLowerCase() === el.nodeName.toLowerCase()) nth++;
        sel += ':nth-of-type(' + nth + ')';
        path.unshift(sel);
      }
      el = el.parentNode;
    }
    return path.join(' > ');
  }
  
  let actionIdCounter = 0;
  document.addEventListener('click', (e) => {
    if (e.isTrusted === false || window.isSimulating) return;
    const sel = getUniqueSelector(e.target);
    if (!sel) return;
    actionIdCounter++;
    window.parent.postMessage({
      type: 'IFRAME_ACTION_TRIGGERED',
      payload: { type: 'UNIVERSAL_CLICK', selector: sel, seed: localSeed, actionId: 'click_' + actionIdCounter + '_' + Date.now() }
    }, '*');
  }, true);

  // 🔥 THE MAGIC FIX: TRACK MOUSE RELATIVE TO THE APP WRAPPER
  let lastCursorTime = 0;
  document.addEventListener('mousemove', (e) => {
    const now = Date.now();
    if (now - lastCursorTime < 40) return;
    lastCursorTime = now;
    
    const wrapper = document.getElementById('app-wrapper');
    if(wrapper) {
        const rect = wrapper.getBoundingClientRect();
        // Calculates exact percentage inside the wrapper box, ignoring scroll!
        let pctX = ((e.clientX - rect.left) / rect.width) * 100;
        let pctY = ((e.clientY - rect.top) / rect.height) * 100;
        
        window.parent.postMessage({
          type: 'IFRAME_ACTION_TRIGGERED',
          payload: { type: 'UNIVERSAL_CURSOR', pctX: pctX, pctY: pctY }
        }, '*');
    }
  });

  document.addEventListener('touchmove', (e) => {
    if (e.touches.length > 0) {
      const now = Date.now();
      if (now - lastCursorTime < 40) return;
      lastCursorTime = now;
      
      const wrapper = document.getElementById('app-wrapper');
      if(wrapper) {
          const rect = wrapper.getBoundingClientRect();
          let pctX = ((e.touches[0].clientX - rect.left) / rect.width) * 100;
          let pctY = ((e.touches[0].clientY - rect.top) / rect.height) * 100;
          
          window.parent.postMessage({
            type: 'IFRAME_ACTION_TRIGGERED',
            payload: { type: 'UNIVERSAL_CURSOR', pctX: pctX, pctY: pctY }
          }, '*');
      }
    }
  }, { passive: true });

  // GENTLE DIMENSION MANAGEMENT (NO ZOOM BUG)
  function applyScale() {
      document.body.style.transform = 'none';
      document.body.style.width = '100%';
      document.body.style.height = '100%';
  }
  window.addEventListener('resize', applyScale);
  window.addEventListener('load', applyScale);

  let lastProcessedActionId = null;
  window.addEventListener('message', (event) => {
    if (event.data?.type === 'EXECUTE_UNIVERSAL_ACTION') {
      const action = event.data.action;
      
      // 🔥 THE MAGIC FIX: APPLY CURSOR INSIDE WRAPPER
      if (action.type === 'UNIVERSAL_CURSOR') {
          const c = document.getElementById('remote-cursor');
          if (c) {
              // Since cursor is absolute inside relative wrapper, % works perfectly!
              c.style.left = action.pctX + '%';
              c.style.top = action.pctY + '%';
              c.style.display = 'block';
          }
          return;
      }

      const currentActionId = action.actionId || action.timestamp;
      if (currentActionId && currentActionId === lastProcessedActionId) return;
      lastProcessedActionId = currentActionId;

      window.isSimulating = true;
      if (action.seed !== undefined) localSeed = action.seed;
      if (action.type === 'UNIVERSAL_CLICK') {
        const el = document.querySelector(action.selector);
        if (el) el.click();
      }
      setTimeout(() => { window.isSimulating = false; }, 50);
    }
  });
</script>

<!-- ============================================================
     PART 2 — CSS
     ============================================================ -->
<style>
    :root {
        --bg-color: #fdf2f8; 
        --primary: #ec4899;
        --secondary: #3b82f6;
        --accent: #f59e0b;
        --text-dark: #1f2937;
        --card-bg: #ffffff;
        --correct-bg: #86efac;
        --wrong-bg: #fca5a5;
        --shadow-soft: 0 8px 20px rgba(0,0,0,0.06);
    }

    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        -webkit-tap-highlight-color: transparent;
        -webkit-user-select: none;
        user-select: none;
        -webkit-user-drag: none;
    }

    button *, .answer-bubble *, .grid-opt *, .range-opt * {
        pointer-events: none;
    }

    html, body {
        font-family: 'Fredoka', sans-serif;
        background-color: var(--bg-color);
        background-image: 
            radial-gradient(#fbcfe8 4px, transparent 4px),
            radial-gradient(#fbcfe8 4px, transparent 4px);
        background-size: 60px 60px;
        background-position: 0 0, 30px 30px;
        color: var(--text-dark);
        width: 100%; min-height: 100vh;
        overflow-y: auto; overflow-x: hidden;
        touch-action: manipulation;
    }

    /* 🔥 THE CONTAINER FOR PERFECT SYNC */
    #app-wrapper {
        position: relative;
        width: 100%; 
        max-width: 1000px;
        margin: 0 auto;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
    }

    /* 🔥 THE RED DOT IS NOW ABSOLUTE TO THE WRAPPER */
    #remote-cursor {
        position: absolute; width: 18px; height: 18px;
        background: red; border-radius: 50%;
        border: 3px solid white;
        box-shadow: 0 0 10px rgba(255,0,0,.6);
        pointer-events: none; z-index: 99999;
        transform: translate(-50%,-50%); display: none;
    }

    .screen {
        display: none; /* Flow layout, NOT absolute */
        width: 100%; 
        flex: 1;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        animation: fadeIn 0.3s ease-in-out;
    }

    .screen.active { display: flex; }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }

    #start-screen {
        background: linear-gradient(135deg, #a78bfa 0%, #ec4899 100%);
        color: white; text-align: center;
        border-radius: 20px;
        margin: auto;
        padding: 40px 20px;
        width: 95%;
        box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    }

    .game-title {
        font-size: clamp(2.5rem, 6vw, 4.5rem);
        text-shadow: 4px 4px 0 rgba(0,0,0,0.2);
        margin-bottom: 30px;
        animation: bounceIn 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @keyframes bounceIn { 0% { transform: scale(0); } 100% { transform: scale(1); } }

    .play-btn {
        background: #fef08a; color: #b45309; border: 6px solid #fff;
        border-radius: 50px; padding: 15px 40px; font-size: 2rem;
        font-weight: 700; cursor: pointer; box-shadow: 0 10px 0 rgba(0,0,0,0.1);
        transition: all 0.2s; display: inline-flex; align-items: center; gap: 15px;
        animation: pulse 2s infinite;
    }

    .play-btn:active { transform: translateY(8px); box-shadow: 0 0 0 rgba(0,0,0,0.1); }
    @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

    #game-screen {
        padding: 15px; 
        justify-content: flex-start;
    }

    .top-bar {
        width: 100%;
        background: white; box-shadow: var(--shadow-soft);
        display: flex; justify-content: space-between; align-items: center;
        padding: 10px 20px; z-index: 20; border-bottom: 4px solid #f3f4f6;
        border-radius: 20px;
        margin-bottom: 15px;
        flex-wrap: wrap; gap: 10px;
    }

    .settings-btn, .refresh-btn {
        background: var(--secondary); color: white; border: none;
        padding: 8px 16px; border-radius: 16px; font-size: 1rem;
        font-weight: bold; cursor: pointer; box-shadow: 0 4px 0 #2563eb;
    }
    .settings-btn:active, .refresh-btn:active {
        transform: translateY(4px); box-shadow: 0 0 0 transparent;
    }
    .refresh-btn { background: #10b981; box-shadow: 0 4px 0 #059669; }

    .score-board {
        font-size: 1.3rem; font-weight: bold; color: var(--primary);
        display: flex; align-items: center; gap: 8px;
    }

    .grid-container {
        display: grid; gap: 12px; width: 100%;
        flex: 1; 
    }

    .grid-layout-2 { grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); }
    .grid-layout-4 { grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); }
    .grid-layout-6 { grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); }

    .game-card {
        background: var(--card-bg); border-radius: 20px; border: 4px solid #e5e7eb;
        display: flex; flex-direction: column; box-shadow: var(--shadow-soft);
        overflow: hidden; min-height: 250px; 
    }

    .objects-area {
        flex: 1; padding: 15px; display: flex; flex-wrap: wrap;
        justify-content: center; align-content: center; gap: 8px;
        background: #f8fafc; border-bottom: 4px solid #e5e7eb;
    }

    .moving-item {
        font-size: clamp(30px, 6vw, 45px);
        animation: movingObject 2s infinite ease-in-out;
        display: inline-block; filter: drop-shadow(2px 4px 0px rgba(0,0,0,0.1));
    }

    @keyframes movingObject {
        0%, 100% { transform: translateY(0) rotate(-5deg); }
        50% { transform: translateY(-5px) rotate(5deg); }
    }

    .answers-area {
        display: flex; justify-content: space-evenly; align-items: center;
        padding: 15px 10px; background: white; flex-wrap: wrap; gap: 10px;
    }

    .answer-bubble {
        width: clamp(55px, 10vw, 75px); height: clamp(55px, 10vw, 75px);
        border-radius: 50%; background: #f1f5f9; border: 4px solid #cbd5e1;
        display: flex; align-items: center; justify-content: center;
        font-size: clamp(1.4rem, 4vw, 2rem); font-weight: 700; color: #475569;
        cursor: pointer; transition: transform 0.1s; box-shadow: 0 4px 0 #cbd5e1;
    }

    .answer-bubble:active { transform: translateY(4px); box-shadow: 0 0 0 transparent; }
    .answer-bubble.correct {
        background: var(--correct-bg); border-color: #16a34a; color: #14532d; box-shadow: 0 4px 0 #16a34a;
    }
    .answer-bubble.wrong {
        background: var(--wrong-bg); border-color: #dc2626; color: #7f1d1d;
        box-shadow: 0 4px 0 #dc2626; animation: shake 0.4s;
    }

    @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }

    /* Modal Styling */
    #settings-modal {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.7); display: flex; align-items: center;
        justify-content: center; z-index: 100; opacity: 0; pointer-events: none;
        transition: opacity 0.2s;
    }

    #settings-modal.active { opacity: 1; pointer-events: all; }

    .modal-content {
        background: white; padding: 25px; border-radius: 20px; width: 90%;
        max-width: 450px; border: 6px solid var(--secondary);
    }

    .modal-content h2 { margin-bottom: 15px; color: var(--secondary); text-align: center; }

    .settings-section {
        background: #f8fafc; padding: 15px; border-radius: 15px;
        margin-bottom: 15px; border: 2px solid #e2e8f0;
    }

    .settings-section h3 { font-size: 1.1rem; color: #475569; margin-bottom: 10px; text-align: center; font-weight: 800;}

    /* GRID SELECTOR STYLES (SYNC SAFE) */
    .grid-selector { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; }

    .grid-opt, .range-opt {
        padding: 10px 15px; border: 3px solid #cbd5e1; border-radius: 12px;
        font-weight: 800; cursor: pointer; background: white; color: #64748b;
        transition: all 0.1s;
    }
    .grid-opt.active, .range-opt.active {
        background: var(--secondary); color: white; border-color: var(--secondary);
        box-shadow: 0 4px 0 #1e40af; transform: translateY(-2px);
    }

    .close-modal {
        background: #ef4444; color: white; border: none;
        padding: 14px 0; width: 100%; border-radius: 15px;
        font-size: 1.3rem; font-weight: 900; cursor: pointer;
        box-shadow: 0 5px 0 #b91c1c; margin-top: 10px;
    }
    .close-modal:active { transform: translateY(5px); box-shadow: 0 0 0 transparent; }
</style>
</head>
<body>

<!-- 🔥 EVERYTHING GOES INSIDE THIS APP-WRAPPER -->
<div id="app-wrapper">

    <!-- RED DOT (Now absolute to the wrapper) -->
    <div id="remote-cursor"></div>

    <!-- Start Screen -->
    <div id="start-screen" class="screen active">
        <h1 class="game-title">Count & Color!</h1>
        <button class="play-btn" id="play-btn">▶ Play Now</button>
    </div>

    <!-- Main Game Screen -->
    <div id="game-screen" class="screen">
        <div class="top-bar">
            <button class="settings-btn" id="open-settings">⚙️ Settings</button>
            <div class="score-board">
                ⭐ <span id="score-text">0</span>
            </div>
            <button class="refresh-btn" id="refresh-btn">Next Game ➔</button>
        </div>

        <!-- The actual game area -->
        <div class="grid-container grid-layout-4" id="game-grid">
            <!-- Game Cards generated by JS -->
        </div>
    </div>

</div> <!-- End of app-wrapper -->

<!-- Settings Modal -->
<div id="settings-modal">
    <div class="modal-content">
        <h2>Game Settings</h2>
        
        <div class="settings-section">
            <h3>Choose Number Range</h3>
            <div class="grid-selector">
                <button class="range-opt active" id="range-1-5" onclick="setRange(1, 5, 'range-1-5')">1 to 5</button>
                <button class="range-opt" id="range-1-10" onclick="setRange(1, 10, 'range-1-10')">1 to 10</button>
                <button class="range-opt" id="range-1-20" onclick="setRange(1, 20, 'range-1-20')">1 to 20</button>
                <button class="range-opt" id="range-10-50" onclick="setRange(10, 50, 'range-10-50')">10 to 50</button>
            </div>
        </div>

        <div class="settings-section">
            <h3>How Many Cards?</h3>
            <div class="grid-selector">
                <button class="grid-opt" id="grid-2" onclick="setGrid(2, 'grid-2')">2 Cards</button>
                <button class="grid-opt active" id="grid-4" onclick="setGrid(4, 'grid-4')">4 Cards</button>
                <button class="grid-opt" id="grid-6" onclick="setGrid(6, 'grid-6')">6 Cards</button>
            </div>
        </div>

        <button class="close-modal" id="close-settings">Save & Play</button>
    </div>
</div>

<!-- ============================================================
     PART 3 — GAME LOGIC
     ============================================================ -->
<script>
    // ==========================================================
    // CRITICAL: Seeded Shuffle Function
    // ==========================================================
    function shuf(arr) {
        arr = [...arr];
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(window.seededRandom() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    const EMOJIS = ['🍎', '🌸', '🚙', '⭐', '🐠'];

    let gameState = {
        columns: 4, 
        score: 0,
        min: 1,
        max: 5
    };

    /* AUDIO SYSTEM */
    let audioCtx = null;
    function initAudio() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }

    function playTone(freq, type, duration, vol=0.1) {
        try {
            initAudio();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            osc.connect(gain); gain.connect(audioCtx.destination);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        } catch(e) {}
    }

    function sfxCorrect() {
        playTone(523.25, 'sine', 0.1, 0.2); 
        setTimeout(() => playTone(659.25, 'sine', 0.1, 0.2), 100); 
        setTimeout(() => playTone(783.99, 'sine', 0.2, 0.2), 200); 
    }

    function sfxWrong() { playTone(200, 'sawtooth', 0.3, 0.1); }

    /* EVENT LISTENERS */
    document.addEventListener('click', () => initAudio(), { once: true });

    document.getElementById('play-btn').addEventListener('click', () => {
        document.getElementById('start-screen').classList.remove('active');
        document.getElementById('game-screen').classList.add('active');
        generateGame();
    });

    document.getElementById('open-settings').addEventListener('click', () => {
        document.getElementById('settings-modal').classList.add('active');
    });
    
    window.setRange = function(min, max, btnId) {
        gameState.min = min;
        gameState.max = max;
        document.querySelectorAll('.range-opt').forEach(b => b.classList.remove('active'));
        document.getElementById(btnId).classList.add('active');
    }

    window.setGrid = function(cols, btnId) {
        gameState.columns = cols;
        document.querySelectorAll('.grid-opt').forEach(b => b.classList.remove('active'));
        document.getElementById(btnId).classList.add('active');
    }

    document.getElementById('close-settings').addEventListener('click', () => {
        document.getElementById('settings-modal').classList.remove('active');
        generateGame(); 
    });

    document.getElementById('refresh-btn').addEventListener('click', () => {
        generateGame();
    });

    /* LOGIC & RENDERING */
    function generateOptions(correctAnswer) {
        let options = new Set([correctAnswer]);
        let range = Math.max(10, gameState.max + 5); 
        
        while(options.size < 3) {
            let rand = Math.floor(window.seededRandom() * range) + 1;
            if(rand !== correctAnswer) options.add(rand);
        }
        return shuf(Array.from(options));
    }

    function generateGame() {
        const grid = document.getElementById('game-grid');
        grid.className = `grid-container grid-layout-${gameState.columns}`;
        grid.innerHTML = '';
        
        let numCards = gameState.columns;
        let cardCounts = [];
        
        for(let i=0; i<numCards; i++) {
            let count = Math.floor(window.seededRandom() * (gameState.max - gameState.min + 1)) + gameState.min;
            cardCounts.push(count);
        }

        for(let i=0; i<numCards; i++) {
            const correctCount = cardCounts[i];
            const options = generateOptions(correctCount);

            const card = document.createElement('div');
            card.className = 'game-card';
            card.id = 'game-card-' + i;

            let objectsHtml = '';
            
            let cardEmoji = EMOJIS[Math.floor(window.seededRandom() * EMOJIS.length)];
            
            for(let j=0; j<correctCount; j++) {
                objectsHtml += `<div class="moving-item" style="animation-delay: ${j * 0.1}s">${cardEmoji}</div>`;
            }

            let answersHtml = '';
            options.forEach((opt, optIndex) => {
                answersHtml += `<div class="answer-bubble" id="ans-card${i}-opt${optIndex}" onclick="checkAnswer(this, ${opt}, ${correctCount})">${opt}</div>`;
            });

            card.innerHTML = `
                <div class="objects-area">${objectsHtml}</div>
                <div class="answers-area">${answersHtml}</div>
            `;
            grid.appendChild(card);
        }
    }

    window.checkAnswer = function(element, selected, correct) {
        if(element.classList.contains('correct') || element.classList.contains('wrong')) return;

        if (selected === correct) {
            element.classList.add('correct');
            sfxCorrect();
            gameState.score += 10;
            document.getElementById('score-text').textContent = gameState.score;
            element.innerHTML += '✨';
            
            try {
                const rect = element.getBoundingClientRect();
                const x = (rect.left + rect.width / 2) / window.innerWidth;
                const y = (rect.top + rect.height / 2) / window.innerHeight;
                confetti({ particleCount: 20, spread: 45, origin: { x, y }, colors: ['#86efac', '#fef08a'] });
            } catch(e) {}
        } else {
            element.classList.add('wrong');
            sfxWrong();
        }
    }
</script>
</body>
</html>
