<!-- ============================================================
     PART 1 — UNIVERSAL SYNC BRIDGE (GOLDEN MASTER)
     ============================================================ -->
<script>
    window.isSimulating = false;
    const urlParams = new URLSearchParams(window.location.search || window.location.hash.replace('#', '?'));
    const roomId = urlParams.get('room') || '54321';
    let localSeed = 0;
    
    window.setSeed = function(str) {
        let tempSeed = 0;
        for (let i = 0; i < str.length; i++) { tempSeed = str.charCodeAt(i) + ((tempSeed << 5) - tempSeed); }
        localSeed = Math.abs(tempSeed);
    };
    window.setSeed(roomId);
    
    window.seededRandom = function() {
        let x = Math.sin(localSeed++) * 10000;
        return x - Math.floor(x);
    };

    function getUniqueSelector(el) {
        if (!el) return null;
        if (el.id) return '#' + el.id;
        if (el === document.body) return 'body';
        let path = [];
        while (el && el.nodeType === Node.ELEMENT_NODE) {
            let selector = el.nodeName.toLowerCase();
            if (el.id) { selector = '#' + el.id; path.unshift(selector); break; } 
            else {
                if (el.className && typeof el.className === 'string') {
                    const classes = Array.from(el.classList).filter(c => !c.includes(':') && !c.includes('[') && !c.includes('/')).join('.');
                    if (classes) selector += '.' + classes;
                }
                let sibling = el, nth = 1;
                while (sibling = sibling.previousElementSibling) { if (sibling.nodeName.toLowerCase() === el.nodeName.toLowerCase()) nth++; }
                selector += ':nth-of-type(' + nth + ')';
                path.unshift(selector);
            }
            el = el.parentNode;
        }
        return path.join(' > ');
    }

    let actionIdCounter = 0;
    document.addEventListener('click', (e) => {
        if (e.isTrusted === false || window.isSimulating) return;
        const selector = getUniqueSelector(e.target); if (!selector) return;
        actionIdCounter++;
        window.parent.postMessage({
            type: 'IFRAME_ACTION_TRIGGERED',
            payload: { type: 'UNIVERSAL_CLICK', selector: selector, seed: localSeed, actionId: 'click_' + actionIdCounter + '_' + Date.now() }
        }, '*');
    }, true);

    document.addEventListener('input', (e) => {
        if (window.isSimulating) return;
        const selector = getUniqueSelector(e.target); if (!selector) return;
        window.parent.postMessage({
            type: 'IFRAME_ACTION_TRIGGERED',
            payload: { type: 'UNIVERSAL_INPUT', selector: selector, value: e.target.value }
        }, '*');
    }, true);

    let lastCursorTime = 0;
    document.addEventListener('mousemove', (e) => {
        const now = Date.now(); if (now - lastCursorTime < 40) return; lastCursorTime = now;
        window.parent.postMessage({ type: 'IFRAME_ACTION_TRIGGERED', payload: { type: 'UNIVERSAL_CURSOR', pctX: (e.clientX / window.innerWidth) * 100, pctY: (e.clientY / window.innerHeight) * 100 } }, '*');
    });

    document.addEventListener('touchmove', (e) => {
        if (e.touches.length > 0) {
            const now = Date.now(); if (now - lastCursorTime < 40) return; lastCursorTime = now;
            window.parent.postMessage({ type: 'IFRAME_ACTION_TRIGGERED', payload: { type: 'UNIVERSAL_CURSOR', pctX: (e.touches[0].clientX / window.innerWidth) * 100, pctY: (e.touches[0].clientY / window.innerHeight) * 100 } }, '*');
        }
    }, { passive: true });

    let lastProcessedActionId = null;
    window.addEventListener('message', (event) => {
        if (event.data && event.data.type === 'EXECUTE_UNIVERSAL_ACTION') {
            const action = event.data.action;
            if (action.type === 'UNIVERSAL_CURSOR') {
                const c = document.getElementById('remote-cursor');
                if (c) {
                    c.style.left = (action.pctX / 100 * window.innerWidth) + 'px';
                    c.style.top = (action.pctY / 100 * window.innerHeight) + 'px';
                    c.style.display = 'block';
                }
                return;
            }
            const currentActionId = action.actionId || action.timestamp;
            if (currentActionId && currentActionId === lastProcessedActionId) return;
            lastProcessedActionId = currentActionId;

            window.isSimulating = true;
            if (action.seed !== undefined) localSeed = action.seed;
            
            if (action.type === 'UNIVERSAL_CLICK') {
                const element = document.querySelector(action.selector);
                if (element) element.click();
            } else if (action.type === 'UNIVERSAL_INPUT') {
                const element = document.querySelector(action.selector);
                if (element) {
                    element.value = action.value;
                    element.dispatchEvent(new Event('input', { bubbles: true }));
                }
            }
            setTimeout(() => { window.isSimulating = false; }, 50);
        }
    });
</script>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {

/* Pointer Events Protection */
button *, .kid-key * { pointer-events: none; }

/* Screens */
.screen { display: none; flex: 1; flex-direction: column; position: relative; overflow: hidden; }
.screen.active { display: flex; animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

.display-text.error { color: #f87171; text-shadow: 0 0 20px #f87171; animation: shake 0.4s ease; }

@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-10px)} 75%{transform:translateX(10px)} }

.test-del { background: none; border: none; color: #ef4444; font-size: 1.2rem; cursor: pointer;}

</style>

<script>
// --- AUDIO SYSTEM ---
let audioCtx = null;
function ac(){ if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); return audioCtx; }
function tone(f,t,d,v=0.2,type='sine'){ try{ const c=ac(), o=c.createOscillator(), g=c.createGain(); o.connect(g); g.connect(c.destination); o.type=type; o.frequency.value=f; g.gain.setValueAtTime(0,c.currentTime); g.gain.linearRampToValueAtTime(v,c.currentTime+0.02); g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+d); o.start(c.currentTime); o.stop(c.currentTime+d+0.1); }catch(e){} }
function sfxType(){ tone(600,'sine',0.08,0.1); }
function sfxWin(){ [[523,0],[659,.1],[784,.2],[1047,.3]].forEach(([f,d])=>setTimeout(()=>tone(f,'sine',0.2,0.2),d*1000)); }
function sfxWrong(){ tone(200,'sawtooth',0.2,0.2); }

document.addEventListener('click', () => ac(), {once: true});

// --- DATA & STATE ---
let locked = false;

// Numbers Data
let numDB = [
    { id: 't_num_1', name: 'Learn 123', seq: '123' },
    { id: 't_num_2', name: 'Count to 5', seq: '12345' }
];

// Alphabets Data

    { id: 't_alp_1', name: 'Animals', seq: 'Cat Dog' },
    { id: 't_alp_2', name: 'Greetings', seq: 'Hello' }
];

let currentAlphaInput = "";

// --- UTILS ---
window.switchScreen = function(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('screen-' + id).classList.add('active');
    sfxType();
};

function cft() {
    try { confetti({ particleCount: 60, spread: 80, origin: { y: 0.6 }, zIndex: 9999 }); } catch(e){}
}

// ==========================================
// NUMBER PAD LOGIC
// ==========================================

function buildNumpad() {
    const cont = document.getElementById('numpad-container');
    cont.innerHTML = '';
    for(let i=1; i<=9; i++) {
        const b = document.createElement('button');
        b.id = 'key-num-' + i; b.className = 'kid-key num-key'; b.innerText = i;
        b.onclick = () => handleNumPress(i.toString());
        cont.appendChild(b);
    }
    const b0 = document.createElement('button');
    b0.id = 'key-num-0'; b0.className = 'kid-key num-key key-zero'; b0.innerText = '0';
    b0.onclick = () => handleNumPress('0');
    cont.appendChild(b0);

    const bClear = document.createElement('button');
    bClear.id = 'key-num-clear'; bClear.className = 'kid-key num-key key-clear'; bClear.innerHTML = '<i class="fas fa-backspace"></i>';
    bClear.onclick = () => clearNum();
    cont.appendChild(bClear);
}

window.startNumPractice = function() {
    numMode = 'practice';
    document.getElementById('num-pad-title').innerText = "Free Practice";
    document.getElementById('num-target-label').innerText = "Find Number:";
    generateNumTarget();
    switchScreen('num-pad');
};

window.openTestList = function(type) {
    if(type === 'num') {
        renderTestList('play-num-test-list', true, 'num');
        switchScreen('num-test-list');
    } else {
        renderTestList('play-alpha-test-list', true, 'alpha');
        switchScreen('alpha-test-list');
    }
};

window.startNumTest = function(id) {
    const test = numDB.find(t => t.id === id);
    if(!test) return;
    numMode = 'test';
    document.getElementById('num-pad-title').innerText = test.name;
    document.getElementById('num-target-label').innerText = "Type Sequence:";
    currentNumTarget = test.seq;
    currentNumInput = "";
    updateNumDisplay();
    switchScreen('num-pad');
};

function generateNumTarget() {
    const len = Math.floor(window.seededRandom() * 3) + 1;
    let res = "";
    for(let i=0; i<len; i++) { res += Math.floor(window.seededRandom() * 10).toString(); }
    currentNumTarget = res;
    currentNumInput = "";
    updateNumDisplay();
}

window.handleNumPress = function(char) {
    if(locked) return;
    sfxType();
    
    const btn = document.getElementById('key-num-' + char);
    if(btn) { btn.classList.add('sim-active'); setTimeout(()=>btn.classList.remove('sim-active'), 100); }

    currentNumInput += char;
    
    if(currentNumTarget.startsWith(currentNumInput)) {
        updateNumDisplay();
        if(currentNumInput === currentNumTarget) handleNumSuccess();
    } else {
        updateNumDisplay();
        handleNumError();
    }
};

window.clearNum = function() {
    if(locked) return;
    sfxType();
    currentNumInput = currentNumInput.slice(0, -1);
    updateNumDisplay();
};

function updateNumDisplay() {
    const disp = document.getElementById('num-display');
    disp.className = 'display-text'; 
    if(currentNumInput === "") {
        disp.innerHTML = `<span style="opacity:0.3">${currentNumTarget}</span>`;
    } else {
        let html = `<span style="color:#4ade80">${currentNumInput}</span>`;
        let rem = currentNumTarget.substring(currentNumInput.length);
        if(rem) html += `<span style="opacity:0.3">${rem}</span>`;
        disp.innerHTML = html;
    }
}

function handleNumSuccess() {
    locked = true; sfxWin(); cft();
    const disp = document.getElementById('num-display');
    disp.classList.add('success');
    setTimeout(() => {
        locked = false;
        disp.classList.remove('success');
        if(numMode === 'practice') generateNumTarget();
        else switchScreen('num-menu');
    }, 1500);
}

function handleNumError() {
    locked = true; sfxWrong();
    const disp = document.getElementById('num-display');
    disp.classList.add('error');
    setTimeout(() => {
        currentNumInput = ""; disp.classList.remove('error'); updateNumDisplay(); locked = false;
    }, 500);
}

window.saveNumTest = function() {
    const name = document.getElementById('inp-num-test-name').value.trim();
    const seq = document.getElementById('inp-num-test-seq').value.trim();
    if(!name || !seq) return;
    
    numDB.push({
        id: 't_n_cust_' + Date.now() + Math.floor(window.seededRandom()*1000), 
        name: name, seq: seq
    });
    
    document.getElementById('inp-num-test-name').value = '';
    document.getElementById('inp-num-test-seq').value = '';
    sfxWin();
    renderTestList('admin-num-test-list', false, 'num');
};

window.deleteNumTest = function(id) {
    numDB = numDB.filter(t => t.id !== id);
    sfxType(); renderTestList('admin-num-test-list', false, 'num');
};

// ==========================================
// ALPHABET PAD LOGIC
// ==========================================

const ALPHABET = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");

function buildAlphapad() {
    const cont = document.getElementById('alphapad-container');
    cont.innerHTML = '';
    ALPHABET.forEach(char => {
        const b = document.createElement('button');
        b.id = 'key-alpha-' + char; 
        b.className = 'kid-key alpha-key'; 
        b.innerText = isUppercase ? char : char.toLowerCase();
        b.onclick = () => handleAlphaPress(char);
        cont.appendChild(b);
    });
}

window.toggleAlphaCase = function() {
    if(locked) return; sfxType();
    isUppercase = !isUppercase;
    ALPHABET.forEach(char => {
        const b = document.getElementById('key-alpha-' + char);
        if(b) b.innerText = isUppercase ? char : char.toLowerCase();
    });
    // Only re-generate if in practice mode
    if(alphaMode === 'practice') {
        generateAlphaTarget();
    }
};

window.startAlphaPractice = function() {
    alphaMode = 'practice';
    document.getElementById('alpha-pad-title').innerText = "Free Practice";
    document.getElementById('alpha-target-label').innerText = "Find Alphabet:";
    generateAlphaTarget();
    switchScreen('alpha-pad');
};

window.startAlphaTest = function(id) {
    const test = alphaDB.find(t => t.id === id);
    if(!test) return;
    alphaMode = 'test';
    document.getElementById('alpha-pad-title').innerText = test.name;
    document.getElementById('alpha-target-label').innerText = "Type Sequence:";
    currentAlphaTarget = test.seq;
    currentAlphaInput = "";
    updateAlphaDisplay();
    switchScreen('alpha-pad');
};

function generateAlphaTarget() {
    const len = Math.floor(window.seededRandom() * 3) + 1;
    let res = "";
    for(let i=0; i<len; i++) {
        let c = ALPHABET[Math.floor(window.seededRandom() * ALPHABET.length)];
        res += isUppercase ? c : c.toLowerCase();
    }
    currentAlphaTarget = res;
    currentAlphaInput = "";
    updateAlphaDisplay();
}

window.handleAlphaPress = function(baseChar) {
    if(locked) return; sfxType();
    
    // Maintain strict case matching unless it is a spacebar
    let char = baseChar;
    if (baseChar !== ' ') {
        char = isUppercase ? baseChar : baseChar.toLowerCase();
        const btn = document.getElementById('key-alpha-' + baseChar);
        if(btn) { btn.classList.add('sim-active'); setTimeout(()=>btn.classList.remove('sim-active'), 100); }
    } else {
        const btn = document.getElementById('btn-alpha-space');
        if(btn) { btn.classList.add('sim-active'); setTimeout(()=>btn.classList.remove('sim-active'), 100); }
    }

    currentAlphaInput += char;
    
    if(currentAlphaTarget.startsWith(currentAlphaInput)) {
        updateAlphaDisplay();
        if(currentAlphaInput === currentAlphaTarget) handleAlphaSuccess();
    } else {
        updateAlphaDisplay(); handleAlphaError();
    }
};

window.clearAlpha = function() {
    if(locked) return; sfxType();
    currentAlphaInput = currentAlphaInput.slice(0, -1);
    updateAlphaDisplay();
};

function updateAlphaDisplay() {
    const disp = document.getElementById('alpha-display');
    disp.className = 'display-text';
    if(currentAlphaInput === "") {
        disp.innerHTML = `<span style="opacity:0.3">${currentAlphaTarget}</span>`;
    } else {
        let html = `<span style="color:#4ade80">${currentAlphaInput}</span>`;
        // Use regular expression to escape special characters if any, but since we limit to a-zA-Z\s it's fine
        let rem = currentAlphaTarget.substring(currentAlphaInput.length);
        if(rem) html += `<span style="opacity:0.3">${rem}</span>`;
        disp.innerHTML = html;
    }
}

function handleAlphaSuccess() {
    locked = true; sfxWin(); cft();
    const disp = document.getElementById('alpha-display');
    disp.classList.add('success');
    setTimeout(() => { 
        locked = false; 
        disp.classList.remove('success');
        if(alphaMode === 'practice') generateAlphaTarget(); 
        else switchScreen('alpha-menu');
    }, 1500);
}

function handleAlphaError() {
    locked = true; sfxWrong();
    const disp = document.getElementById('alpha-display');
    disp.classList.add('error');
    setTimeout(() => { 
        currentAlphaInput = ""; disp.classList.remove('error'); updateAlphaDisplay(); locked = false; 
    }, 500);
}

window.saveAlphaTest = function() {
    const name = document.getElementById('inp-alpha-test-name').value.trim();
    const seq = document.getElementById('inp-alpha-test-seq').value; // Keep exact casing and spaces
    if(!name || !seq) return;
    
    alphaDB.push({
        id: 'a_cust_' + Date.now() + Math.floor(window.seededRandom()*1000), 
        name: name, seq: seq
    });
    
    document.getElementById('inp-alpha-test-name').value = '';
    document.getElementById('inp-alpha-test-seq').value = '';
    sfxWin();
    renderTestList('admin-alpha-test-list', false, 'alpha');
};

window.deleteAlphaTest = function(id) {
    alphaDB = alphaDB.filter(t => t.id !== id);
    sfxType(); renderTestList('admin-alpha-test-list', false, 'alpha');
};

// ==========================================
// SHARED UI UTILS
// ==========================================

function renderTestList(containerId, isPlayMode, type) {
    const cont = document.getElementById(containerId);
    if(!cont) return;
    cont.innerHTML = '';
    
    const dbArray = type === 'num' ? numDB : alphaDB;
    
    dbArray.forEach(t => {
        const item = document.createElement('div');
        item.className = 'test-item';
        let html = `<div><div class="test-name">${t.name}</div><div class="test-seq">${t.seq}</div></div>`;
        if(isPlayMode) {
            item.innerHTML = html; 
            item.onclick = () => {
                if(type === 'num') startNumTest(t.id);
                else startAlphaTest(t.id);
            };
        } else {
            html += `<button class="test-del" onclick="${type === 'num' ? `deleteNumTest('${t.id}')` : `deleteAlphaTest('${t.id}')`}"><i class="fas fa-trash"></i></button>`;
            item.innerHTML = html;
        }
        cont.appendChild(item);
    });
}

// --- INIT ---
buildNumpad();
buildAlphapad();
renderTestList('admin-num-test-list', false, 'num');
renderTestList('admin-alpha-test-list', false, 'alpha');

</script>
