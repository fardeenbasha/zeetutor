<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🔢 Number Blast!</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<!-- ============================================================
     PART 1 — RELATIVE WRAPPER SYNC BRIDGE (PERFECTED)
     ============================================================ -->
<script>
    window.isSimulating = false;
    const urlParams = new URLSearchParams(window.location.search || window.location.hash.replace('#', '?'));
    const roomId = urlParams.get('room') || '54321';
    
    let localSeed = 0;
    // 🔥 CRITICAL: Explicit Seed Setter function
    window.setSeed = function(str) {
        let t = 0;
        for (let i = 0; i < str.length; i++) {
            t = str.charCodeAt(i) + ((t << 5) - t);
        }
        localSeed = Math.abs(t);
    };
    window.setSeed(roomId);

    // 🔥 CRITICAL: Only game logic uses this. Stars/Confetti use normal Math.random
    window.seededRandom = function() {
        let x = Math.sin(localSeed++) * 10000;
        return x - Math.floor(x);
    };

    function getUniqueSelector(el) {
        if (!el) return null;
        if (el.id) return '#' + el.id;
        if (el === document.body) return 'body';
        let path = [];
        while (el && el.nodeType === Node.ELEMENT_NODE) {
            let selector = el.nodeName.toLowerCase();
            if (el.id) {
                selector = '#' + el.id;
                path.unshift(selector);
                break;
            } else {
                if (el.className) {
                    const classes = Array.from(el.classList)
                        .filter(c => !c.includes(':') && !c.includes('[') && !c.includes(']') && !c.includes('/'))
                        .join('.');
                    if (classes) selector += '.' + classes;
                }
                let sibling = el;
                let nth = 1;
                while (sibling = sibling.previousElementSibling) {
                    if (sibling.nodeName.toLowerCase() === el.nodeName.toLowerCase()) { nth++; }
                }
                selector += ':nth-of-type(' + nth + ')';
                path.unshift(selector);
            }
            el = el.parentNode;
        }
        return path.join(' > ');
    }

    let actionIdCounter = 0;
    document.addEventListener('click', (e) => {
        if (e.isTrusted === false || window.isSimulating) return;
        const selector = getUniqueSelector(e.target);
        if (!selector) return;

        actionIdCounter++;
        window.parent.postMessage({
            type: 'IFRAME_ACTION_TRIGGERED',
            payload: {
                type: 'UNIVERSAL_CLICK',
                selector: selector,
                seed: localSeed,
                actionId: 'click_' + actionIdCounter + '_' + Date.now()
            }
        }, '*');
    }, true);

    // 🔥 THE MAGIC FIX: TRACK MOUSE RELATIVE TO THE APP WRAPPER
    let lastCursorTime = 0;
    document.addEventListener('mousemove', (e) => {
        const now = Date.now();
        if (now - lastCursorTime < 40) return;
        lastCursorTime = now;
        
        const wrapper = document.getElementById('app-wrapper');
        if(wrapper) {
            const rect = wrapper.getBoundingClientRect();
            let pctX = ((e.clientX - rect.left) / rect.width) * 100;
            let pctY = ((e.clientY - rect.top) / rect.height) * 100;
            
            window.parent.postMessage({
              type: 'IFRAME_ACTION_TRIGGERED',
              payload: { type: 'UNIVERSAL_CURSOR', pctX: pctX, pctY: pctY }
            }, '*');
        }
    });

    document.addEventListener('touchmove', (e) => {
        if (e.touches.length > 0) {
            const now = Date.now();
            if (now - lastCursorTime < 40) return;
            lastCursorTime = now;
            
            const wrapper = document.getElementById('app-wrapper');
            if(wrapper) {
                const rect = wrapper.getBoundingClientRect();
                let pctX = ((e.touches[0].clientX - rect.left) / rect.width) * 100;
                let pctY = ((e.touches[0].clientY - rect.top) / rect.height) * 100;
                
                window.parent.postMessage({
                  type: 'IFRAME_ACTION_TRIGGERED',
                  payload: { type: 'UNIVERSAL_CURSOR', pctX: pctX, pctY: pctY }
                }, '*');
            }
        }
    }, { passive: true });

    // 🔥 GENTLE DIMENSION MANAGEMENT (NO ZOOM BUG)
    function applyScale() {
        document.body.style.transform = 'none';
        document.body.style.width = '100%';
        document.body.style.height = '100%';
    }
    window.addEventListener('resize', applyScale);
    window.addEventListener('load', applyScale);

    let lastProcessedActionId = null;
    window.addEventListener('message', (event) => {
        if (event.data && event.data.type === 'EXECUTE_UNIVERSAL_ACTION') {
            const action = event.data.action;
            
            if (action.type === 'UNIVERSAL_CURSOR') {
                const c = document.getElementById('remote-cursor');
                if (c) {
                    // Coordinates are now percentages of the wrapper!
                    c.style.left = action.pctX + '%';
                    c.style.top = action.pctY + '%';
                    c.style.display = 'block';
                }
                return;
            }

            const currentActionId = action.actionId || action.timestamp;
            if (currentActionId && currentActionId === lastProcessedActionId) return;
            lastProcessedActionId = currentActionId;

            window.isSimulating = true;
            if (action.seed !== undefined) {
                localSeed = action.seed;
            }

            if (action.type === 'UNIVERSAL_CLICK') {
                const element = document.querySelector(action.selector);
                if (element) {
                    element.click();
                }
            }
            setTimeout(() => { window.isSimulating = false; }, 50);
        }
    });
</script>

<!-- ============================================================
     PART 2 — STYLES (GOLDEN TEMPLATE)

<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

/* Pointer Events Protection */
button *, .card-wrapper *, .pair-btn * { pointer-events: none; }

body {

  width: 100%;

@keyframes twinkle {
  0%, 100% { opacity: 0.1; transform: scale(1); }
  50% { opacity: 0.8; transform: scale(1.4); }
}

/* 🔥 THE CONTAINER FOR PERFECT SYNC AND SCALING */

/* 🔥 FLUID & CONTROLLED GAME BOARD */
.game-container {

}

  justify-content: center; align-content: center;
}

/* 🔥 NORMAL SIZE CARDS (NO GIANT SIZES) */
.card-wrapper {

    width: 100%; 
    max-width: 110px; /* Restricts individual card size */
    max-height: 110px;

}

.card-inner {

  transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}

}
.card-back {

}
.card-front { transform: rotateY(180deg); background: white; border: 3px solid rgba(0,0,0,0.1); }
.card-front img { width: 90%; height: 90%; object-fit: contain; }
.card-wrapper.matched .card-front { border-color: #06d6a0; box-shadow: 0 0 15px rgba(6,214,160,0.5); }

#overlay { display: none; position: absolute; inset: 0; z-index: 400; background: rgba(0,0,0,0.6); border-radius: 1.5rem; }
#overlay.active { display: block; }

  background: linear-gradient(135deg, #f72585, #7209b7); border-radius: 20px; padding: 15px 30px;
  font-size: 1.5rem; font-weight: 900; color: white; text-align: center; border: 4px solid rgba(255,255,255,0.4);
  z-index: 700; box-shadow: 0 10px 30px rgba(0,0,0,0.5); white-space: nowrap;
}

@keyframes bounce { from { transform: scale(1); } to { transform: scale(1.1); } }

.win-sub { font-size: 1.1rem; font-weight: 800; color: rgba(255,255,255,0.7); margin-bottom: 25px; }

.win-btn:active { transform: translateY(6px); box-shadow: 0 0 0 transparent; }
</style>
</head>
<body>

<div class="star-bg" id="star-bg"></div>

<!-- 🔥 EVERYTHING GOES INSIDE THIS APP-WRAPPER -->
<div id="app-wrapper">

    <!-- RED DOT (Now absolute to the wrapper) -->

    <!-- ── SCREEN 1: MENU ── -->
    <div class="screen active" id="scr-menu">

      <div class="menu-grid">

    <div class="screen" id="scr-custom">
      <div style="width: 100%; display: flex; flex-direction: column; align-items: center;">
          <button class="btn-back" id="back-custom" onclick="show('scr-menu')">◀</button>

          <div class="section-label">Pairs to match:</div>

<!-- ============================================================
     PART 3 — GAME LOGIC
     ============================================================ -->
<script>
// 🔥 Use NORMAL Math.random for visual background so it doesn't ruin the seed
const bg = document.getElementById('star-bg');
for (let i = 0; i < 40; i++) {
  const s = document.createElement('div'); s.className = 'star';
  const size = 1 + Math.random() * 2; 
  s.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*100}%;top:${Math.random()*100}%;animation-duration:${2+Math.random()*4}s;animation-delay:${-Math.random()*4}s;`;
  bg.appendChild(s);
}

// Data Utils - Uses the LiveTutor Seed strictly
function shuf(arr) {
  let a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(window.seededRandom() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

const IMG_CACHE = {};
function getImg(num) {
  if (IMG_CACHE[num]) return IMG_CACHE[num];
  const cv = document.createElement('canvas'); cv.width = 160; cv.height = 160;
  const ctx = cv.getContext('2d');
  const cols = [['#ff9a9e','#fecfef'], ['#a18cd1','#fbc2eb'], ['#84fab0','#8fd3f4'], ['#fccb90','#d57eeb']];
  const c = cols[num % cols.length];
  const grd = ctx.createLinearGradient(0,0,160,160); grd.addColorStop(0,c[0]); grd.addColorStop(1,c[1]);
  ctx.fillStyle = grd; ctx.beginPath(); ctx.arc(80,80,75,0,Math.PI*2); ctx.fill();
  ctx.font = `900 ${num>9?60:80}px 'Nunito', sans-serif`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillStyle = 'rgba(0,0,0,0.2)'; ctx.fillText(num, 83, 83);
  ctx.fillStyle = 'white'; ctx.fillText(num, 80, 80);
  IMG_CACHE[num] = cv.toDataURL('image/png'); return IMG_CACHE[num];
}

// Flow
function show(id) { 
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); 
    document.getElementById(id).classList.add('active'); 
}

const wait = ms => new Promise(r => setTimeout(r, ms));

let rFrom = 1, rTo = 5, rPairs = 2;
let customFrom = 1, customTo = 10, customPairs = 2;
let lastPlayFunction = null;
let gameRound = 0; // 🔥 Ensure unique deterministic seed every round

// Range Logic
function openRange(f, t) {
  rFrom = f; rTo = t; rPairs = 2;
  document.getElementById('range-title').textContent = `${f} to ${t}`;
  const cont = document.getElementById('range-pairs'); cont.innerHTML = '';
  const max = Math.min(t - f + 1, 6);
  for(let i=2; i<=max; i++){
    const b = document.createElement('button');
    b.className = 'pair-btn' + (i===2?' active':''); b.id=`pb-range-${i}`; b.innerText = i;
    b.onclick = () => { document.querySelectorAll('#range-pairs .pair-btn').forEach(x=>x.classList.remove('active')); b.classList.add('active'); rPairs=i; sfxHit(); };
    cont.appendChild(b);
  }
  show('scr-range');
}

function startGameParams() {
  lastPlayFunction = startGameParams;
  
  // 🔥 CRITICAL: Re-seed before generating the game to ensure BOTH screens generate identical pools
  gameRound++;
  window.setSeed(roomId + "_game_" + gameRound); 
  
  const pool = []; for (let i = rFrom; i <= rTo; i++) pool.push(i);
  const chosen = shuf(pool).slice(0, rPairs);
  renderGame(chosen, `${rFrom}-${rTo} • ${rPairs} Pairs`);
}

// Custom Logic
function openCustomScreen() {
  customFrom = 1; customTo = 10; customPairs = 2;
  const cont = document.getElementById('custom-pairs'); cont.innerHTML = '';
  for(let i=2; i<=6; i++){
    const b = document.createElement('button');
    b.className = 'pair-btn' + (i===2?' active':''); b.id=`pb-custom-${i}`; b.innerText = i;
    b.onclick = () => { document.querySelectorAll('#custom-pairs .pair-btn').forEach(x=>x.classList.remove('active')); b.classList.add('active'); customPairs=i; sfxHit(); };
    cont.appendChild(b);
  }
  updateCustomDisplay();
  show('scr-custom');
}

function updateCustomDisplay() {
  document.getElementById('from-val').textContent = customFrom;
  document.getElementById('to-val').textContent = customTo;
}

function adjustFrom(d) {
  customFrom = Math.max(1, Math.min(customTo - 1, customFrom + d));
  updateCustomDisplay(); sfxHit();
}
function adjustTo(d) {
  customTo = Math.max(customFrom + 1, Math.min(100, customTo + d));
  updateCustomDisplay(); sfxHit();
}

function startCustomGame() {
  lastPlayFunction = startCustomGame;
  
  // 🔥 CRITICAL: Re-seed before generating the game
  gameRound++;
  window.setSeed(roomId + "_customgame_" + gameRound); 

  const available = customTo - customFrom + 1;
  const pairs = Math.min(customPairs, available);
  const pool = []; for (let i = customFrom; i <= customTo; i++) pool.push(i);
  const chosen = shuf(pool).slice(0, pairs);
  renderGame(chosen, `Custom ${customFrom}-${customTo} • ${pairs} Pairs`);
}

function replay() { 
    if(lastPlayFunction) lastPlayFunction(); 
}

// Game Core
let flipped = [], matched = [], locked = false;

async function renderGame(pool, info) {
  flipped = []; matched = []; 
  locked = true; // 🔥 CRITICAL: Lock IMMEDIATELY so no clicks happen during setup
  
  document.getElementById('game-info').textContent = info;
  const board = document.getElementById('board');
  
  while (board.firstChild) board.removeChild(board.firstChild);

  const total = pool.length * 2;
  let cols = total <= 4 ? 2 : (total <= 6 ? 3 : 4);
  
  board.style.gridTemplateColumns = `repeat(${cols}, minmax(60px, 1fr))`;
  
  const deck = shuf([...pool, ...pool]);
  deck.forEach((n, idx) => {
    const wrap = document.createElement('div');
    wrap.className = 'card-wrapper'; wrap.id = `card-${idx}`; wrap.dataset.num = n;
    wrap.innerHTML = `<div class="card-inner"><div class="card-face card-back">❓</div><div class="card-face card-front"><img src="${getImg(n)}"></div></div>`;
    wrap.onclick = () => handleCard(wrap);
    board.appendChild(wrap);
  });

  show('scr-game');
  
  const ban = document.getElementById('reveal-banner');
  const overlay = document.getElementById('overlay');
  
  ban.innerText = "Memorize!"; 
  ban.style.display = "block";
  overlay.classList.add('active'); // Use overlay to block ALL clicks

  document.querySelectorAll('.card-wrapper').forEach(c => c.classList.add('flipped'));
  
  // Strict timeout
  await wait(2000); 
  
  document.querySelectorAll('.card-wrapper').forEach(c => c.classList.remove('flipped'));
  ban.style.display = "none";
  overlay.classList.remove('active');
  locked = false; // Unlock only after cards flip back
}

function handleCard(c) {
  if (locked || c.classList.contains('flipped') || c.classList.contains('matched')) return;
  sfxHit(); c.classList.add('flipped'); flipped.push(c);
  if (flipped.length === 2) { locked = true; check(); }
}

function check() {
  const [a, b] = flipped;
  if (a.dataset.num === b.dataset.num) {
    setTimeout(() => {
      a.classList.add('matched'); b.classList.add('matched');
      matched.push(a, b); sfxMatch(); flipped = []; locked = false;
      if (matched.length === document.querySelectorAll('.card-wrapper').length) setTimeout(()=> { sfxWin(); show('scr-win'); confetti(); }, 500);
    }, 400);
  } else {
    setTimeout(() => { a.classList.remove('flipped'); b.classList.remove('flipped'); flipped = []; locked = false; }, 800);
  }
}

// Audio
let AC=null; const gAC=()=>{if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();if(AC.state==='suspended')AC.resume();return AC;};
document.addEventListener('click',gAC,{once:true});
function pT(f,t,v,s,d){try{const c=gAC(),o=c.createOscillator(),g=c.createGain();o.type=t;o.frequency.value=f;g.gain.setValueAtTime(v,s);g.gain.exponentialRampToValueAtTime(.001,s+d);o.connect(g);g.connect(c.destination);o.start(s);o.stop(s+d+.1);}catch(e){}}
function sfxHit(){const t=gAC().currentTime; pT(600,'sine',.1,t,.05);}
function sfxMatch(){const t=gAC().currentTime; [523,659,784].forEach((f,i)=>pT(f,'triangle',.1,t+i*.1,.2));}
function sfxWin(){const t=gAC().currentTime; [[523,0],[659,.1],[784,.2],[1047,.3]].forEach(([f,d])=>pT(f,'triangle',.2,t+d,.3));}
